.fin{color:var(--gold);font-size:.7rem}

.clk{cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px}

function advFromScores(t1_90,t2_90,t1_et,t2_et,pen_winner,m){
 const [A,B]=TEAM[m];
 if(t1_90!=null&&t2_90!=null&&t1_90!==t2_90) return t1_90>t2_90?A:B;
 if(t1_et!=null&&t2_et!=null&&t1_et!==t2_et) return t1_et>t2_et?A:B;
 if(pen_winner) return pen_winner;
 return null;
}

// ---- scoring ----
// STARÉ pravidlá (1. kolo / osemfinále, match_no <= 88)
function scoreDetailOld(P,R){
 if(!R||!R.finished) return null;
 let pts=0; const parts=[];
 const Radv=R.advancer;
 const Padv=advFromScores(P.t1_90,P.t2_90,P.t1_et,P.t2_et,P.pen_winner,P.match_no);
 const advOK=Padv&&Radv&&Padv===Radv; if(advOK){pts+=1;parts.push("postup +1");}
 const g1=P.t1_90===R.t1_90, g2=P.t2_90===R.t2_90;
 if(g1){pts+=1;parts.push("góly domáci 90' +1");} if(g2){pts+=1;parts.push("góly hostia 90' +1");}
 const full90=g1&&g2;
 if(R.went_et){ const e1=P.t1_et===R.t1_et,e2=P.t2_et===R.t2_et;
   if(e1){pts+=1;parts.push("predĺženie domáci +1");} if(e2){pts+=1;parts.push("predĺženie hostia +1");} }
 let penExact=false;
 if(R.went_pens){ penExact=(P.pen_t1===R.pen_t1&&P.pen_t2===R.pen_t2&&P.pen_t1!=null);
   const penWin=(P.pen_winner&&P.pen_winner===R.advancer);
   if(penExact){pts+=2;parts.push("penalty presne +2");} else if(penWin){pts+=1;parts.push("penalty víťaz +1");} }
 let allExact=advOK&&full90;
 if(R.went_et)allExact=allExact&&(P.t1_et===R.t1_et&&P.t2_et===R.t2_et);
 if(R.went_pens)allExact=allExact&&penExact;
 if(allExact){pts+=2;parts.push("BONUS +2");}
 return {pts,parts};
}
// NOVÉ pravidlá (od R16, match_no >= 89)
function scoreDetailNew(P,R){
 if(!R||!R.finished) return null;
 let pts=0; const parts=[];
 const Padv=advFromScores(P.t1_90,P.t2_90,P.t1_et,P.t2_et,P.pen_winner,P.match_no);
 if(Padv&&Padv===R.advancer){pts+=1;parts.push("postup +1");}
 if(P.t1_90!=null&&P.t2_90!=null){
   const sg=x=>x>0?1:x<0?-1:0;
   const exact90=(P.t1_90===R.t1_90&&P.t2_90===R.t2_90);
   if(sg(P.t1_90-P.t2_90)===sg(R.t1_90-R.t2_90)){pts+=1;parts.push("tendencia 90' +1");}
   if(exact90){pts+=5;parts.push("presný 90' +5");}
   else if((P.t1_90-P.t2_90)===(R.t1_90-R.t2_90)){pts+=1;parts.push("rozdiel 90' +1");}
   const predDraw=(P.t1_90===P.t2_90)&&(P.t1_et!=null&&P.t1_et===P.t2_et);
   if(predDraw){
     if(R.went_et&&P.t1_et===R.t1_et&&P.t2_et===R.t2_et){
       const golET=(R.t1_et!==R.t1_90||R.t2_et!==R.t2_90);
       if(golET){pts+=2;parts.push("presný predĺženie (gól) +2");}
       else{pts+=1;parts.push("presný predĺženie (bez gólu) +1");}
     }
     if(R.went_pens&&P.pen_t1!=null&&P.pen_t1===R.pen_t1&&P.pen_t2===R.pen_t2){pts+=3;parts.push("presné penalty +3");}
   }
 }
 return {pts,parts};
}

function statRows(players,nos){
 return Object.keys(players).map(pl=>{
   let body=0,maxM=0,p90=0,pred=0,pen=0,postup=0,b7=0,b3=0,b2=0,b1=0,b0=0,bine=0,tipped=0;
   for(const no of nos){const R=RESULTS[no];const P=players[pl][no];
     if(!R||!R.finished||!P)continue;
     tipped++;
     const pts=scoreOne(P,R)||0; body+=pts; maxM+=R.went_pens?12:7;
     const Padv=advFromScores(P.t1_90,P.t2_90,P.t1_et,P.t2_et,P.pen_winner,no);
     if(Padv&&Padv===R.advancer)postup++;
     if(P.t1_90===R.t1_90&&P.t2_90===R.t2_90)p90++;
     if(R.went_et&&P.t1_et!=null&&P.t1_et===R.t1_et&&P.t2_et===R.t2_et)pred++;
     if(R.went_pens&&P.pen_t1!=null&&P.pen_t1===R.pen_t1&&P.pen_t2===R.pen_t2)pen++;
     if(pts>=7)b7++;else if(pts===3)b3++;else if(pts===2)b2++;else if(pts===1)b1++;else if(pts===0)b0++;else bine++;
   }
   return {pl,body,maxM,pct:maxM?Math.round(body/maxM*100):0,p90,pred,pen,postup,b7,b3,b2,b1,b0,bine,tipped};
 }).filter(r=>r.tipped>0)
   .sort((x,y)=> x.pl===ROBIN_NAME?1 : y.pl===ROBIN_NAME?-1 : (y.body-x.body)||(y.pct-x.pct)||x.pl.localeCompare(y.pl,'sk'));
}

   const trump=(trumpOn&&TRUMP.has(pl))?TRUMP_PTS:0; tot+=trump;
   return {pl,tot,delta,trump};
 }).sort((x,y)=>(x.pl===ROBIN_NAME?1:y.pl===ROBIN_NAME?-1:(y.tot-x.tot)||(y.delta-x.delta)||x.pl.localeCompare(y.pl,'sk')));
 const t=new Date().toLocaleTimeString('sk-SK',{hour:'2-digit',minute:'2-digit'});
 let h=`<div style="font-weight:800;font-size:1.1rem;margin-bottom:2px">🔴 Naživo — priebežná tabuľka</div>
   <div class="note" style="margin:0 0 10px">Aktualizované o ${t} · obnovuje sa každých 30 s</div>`;
 if(live.length){
   h+=live.map(R=>{const[A,B]=TEAM[R.match_no]||["",""];
     return `<div style="background:#150a0a;border:1px solid #5a1f1f;border-radius:10px;padding:8px 10px;margin-bottom:8px">
       <span style="color:#ff5a5a;font-weight:700">● LIVE</span> &nbsp;M${R.match_no}<br>
       <span style="font-size:1.05rem">${flag(A)}${A} <b>${R.t1_90}</b> : <b>${R.t2_90}</b> ${flag(B)}${B}</span></div>`;}).join("");
 }else{
   h+=`<div class="note" style="margin-bottom:10px">Práve neprebieha žiadny zápas — tabuľka zobrazuje aktuálny stav.</div>`;
 }
 h+=`<table><thead><tr><th class="rank">#</th><th>Hráč</th><th class="r">Body</th>${trumpOn?'<th class="r">🇺🇸 Trump</th>':''}<th class="r">${live.length?"+ zo živého":""}</th></tr></thead><tbody>`;
 rows.forEach((r,i)=>{
   const dz=r.delta>0?`<span style="color:#ff7a7a;font-weight:700">+${r.delta}</span>`:(live.length?'<span style="color:var(--muted)">0</span>':'');
   const tz=trumpOn?(r.trump>0?`<span style="color:#f6c33a;font-weight:800">+${r.trump}</span>`:'<span style="color:var(--muted)">0</span>'):'';
   h+=`<tr><td class="rank">${i+1}</td><td class="${r.pl===me?'me':''}">${r.pl}</td><td class="r"><b>${r.tot}</b></td>${trumpOn?`<td class="r">${tz}</td>`:''}<td class="r">${dz}</td></tr>`;
 });
 h+=`</tbody></table>`;
 if(trumpOn)h+=`<p class="note" style="margin-top:8px">🇺🇸 <b>Trump body:</b> „Dávam Peťovi a Paľovi 20 bodov. A aj Remča. Ja som rozhodol!" 😎</p>`;
 if(live.length)h+=`<p class="note" style="margin-top:8px">„+ zo živého" = body, čo hráčovi pribudli z práve hraného zápasu (keby skončil týmto výsledkom). Po skončení sa započítajú napevno.</p>`;
 $("modalBody").innerHTML=h;
}

// ================= TIPY (všetkých účastníkov) =================
async function loadTipy(){
 $("s-tipy").innerHTML='<p class="note">Načítavam…</p>';
 await loadResults();
 const{data:preds}=await sb.from("predictions").select("*");
 const reveal=sessionStorage.getItem("adm")==="1";
 const byMatch={},pset=new Set();
 (preds||[]).forEach(p=>{(byMatch[p.match_no]=byMatch[p.match_no]||[]).push(p);pset.add(p.player);});
 let h=`<div class="card"><span class="pill">${pset.size} účastníkov</span> `+
   (reveal?`<span class="pill" style="color:var(--gold)">admin: vidíš všetky tipy</span>`
          :`<span class="note">Tipy na zápas sa odhalia po jeho odohratí (aby sa nedalo opisovať).</span>`)+`</div>`;
 // tipy na celkového víťaza — odhalia sa po uzávierke hlasovania
 const champRows=(byMatch[0]||[]).slice().sort((a,b)=>(a.advancer||'').localeCompare(b.advancer||'','sk'));
 if(champRows.length){
   const showC=championLocked()||reveal;
   h+=`<div class="card"><div style="font-weight:700;margin-bottom:6px">🏆 Tipy na celkového víťaza MS</div>`;
   if(showC){champRows.forEach(p=>{h+=`<div class="bd">${p.player}: ${flag(p.advancer)}<b>${p.advancer||'?'}</b></div>`;});}
   else{h+=`<p class="note" style="margin:0">Skryté do uzávierky (dnes 19:00). Zatiaľ tipovalo: ${champRows.map(p=>p.player).join(', ')}</p>`;}
   h+=`</div>`;
 }
 const _now=Date.now();
 const _ord=M.slice().sort((p,q)=>{const k1=+KO[p[0]],k2=+KO[q[0]];const s1=k1<=_now,s2=k2<=_now;return s1!==s2?(s1?1:-1):(s1?k2-k1:k1-k2);});
 for(const m of _ord){const no=m[0];const[A,B]=TEAM[no];const R=RESULTS[no];const list=byMatch[no]||[];const fin=R&&R.finished;
   const show=isLocked(no)||reveal;
   const resTxt=fin?`<span class="fin">${R.t1_90}:${R.t2_90}${R.went_pens?' (pen)':R.went_et?' (pred.)':''} → ${R.advancer}</span>`:(isLocked(no)?`<span class="fin">🔒 prebieha</span>`:`<span>${list.length} tipov</span>`);
   h+=`<div class="card"><div class="mhead"><span>M${no} · ${flag(A)}${A} – ${flag(B)}${B}</span><span>${resTxt}</span></div>`;
   if(show){
     if(!list.length){h+='<div class="bd">— zatiaľ bez tipov —</div>';}
     else{
       const arr=fin?list.map(P=>({P,s:scoreOne(P,R)})).sort((x,y)=>y.s-x.s):list.map(P=>({P,s:null}));
       h+='<table><thead><tr><th>Hráč</th><th>Tip</th>'+(fin?'<th class="r">Body</th>':'')+'</tr></thead><tbody>';
       arr.forEach(({P,s})=>{let tip=`${P.t1_90}:${P.t2_90}`;if(P.t1_et!=null)tip+=` / pred. ${P.t1_et}:${P.t2_et}`;
         if(P.pen_t1!=null)tip+=` / pen ${P.pen_t1}:${P.pen_t2}`+(P.pen_winner?` (${P.pen_winner})`:'');else if(P.pen_winner)tip+=` / pen víťaz ${P.pen_winner}`;
         h+=`<tr><td>${P.player}</td><td>${tip} → ${P.advancer||'?'}</td>`+(fin?`<td class="r"><b>${s}</b></td>`:'')+`</tr>`;});
       h+='</tbody></table>';
     }
   } else {
     h+= list.length? `<div class="bd">Tipli: ${list.map(p=>p.player).join(', ')}</div>`
                    : '<div class="bd">Zatiaľ nikto netipol.</div>';
   }
   h+='</div>';
 }
 $("s-tipy").innerHTML=h;
}

// ================= PAVÚK (bracket) =================
// kto koho kŕmi (Mxx -> dvaja "predchodcovia": R32 = tímy, ďalšie kolá = víťaz zápasu)
const FEED={89:[74,77],90:[73,75],93:[83,84],94:[81,82],91:[76,78],92:[79,80],95:[86,88],96:[85,87],
 97:[89,90],98:[93,94],99:[91,92],100:[95,96],101:[97,98],102:[99,100],104:[101,102]};
const LEFT={R32:[74,77,73,75,83,84,81,82],R16:[89,90,93,94],QF:[97,98],SF:[101]};
const RIGHT={R32:[76,78,79,80,86,88,85,87],R16:[91,92,95,96],QF:[99,100],SF:[102]};
function flagS(t){const c=FLAG[t];return c?`<img src="https://flagcdn.com/16x12/${c}.png" width="16" height="12" loading="lazy" style="vertical-align:-2px;border-radius:2px" alt="">`:"";}
function partsOf(id){
 if(id>=73&&id<=88)return TEAM[id]||["?","?"];
 return (FEED[id]||[]).map(f=>(RESULTS[f]&&RESULTS[f].finished)?RESULTS[f].advancer:("Víťaz M"+f));
}
function bmatch(id,isFinal){
 const R=RESULTS[id]; const fin=R&&R.finished; const [A,B]=partsOf(id);
 const adv=fin?R.advancer:null;
 const mm=M.find(x=>x[0]===id); const when=mm?mm[3]:""; // čas (zatiaľ len R32)
 const note=fin?(R.went_pens?`pen ${R.pen_t1}:${R.pen_t2}`:(R.went_et?`pp ${R.t1_et}:${R.t2_et}`:"")):"";
 const row=(T,sc,win)=>`<div class="brow ${win?'win':''}">${flagS(T)}<span class="nm">${T}</span><b>${sc}</b></div>`;
 return `<div class="bmatch${isFinal?' final':''}"><div class="bmhd">${isFinal?'🏆 FINÁLE':'M'+id}${when?' · '+when:''}${note?' · '+note:''}</div>`
   +row(A,fin?R.t1_90:"",adv&&adv===A)+row(B,fin?R.t2_90:"",adv&&adv===B)+`</div>`;
}
function bcol(ids,label){return `<div class="bcol"><div class="bclab">${label}</div>${ids.map(id=>bmatch(id)).join("")}</div>`;}
async function renderBracket(){
 $("s-pavuk").innerHTML='<p class="note">Načítavam…</p>';
 await loadResults();
 const cols=[
   bcol(LEFT.R32,"Šestnásťfinále"),bcol(LEFT.R16,"Osemfinále"),bcol(LEFT.QF,"Štvrťfinále"),bcol(LEFT.SF,"Semifinále"),
   `<div class="bcol fin"><div class="bclab">Finále</div>${bmatch(104,true)}</div>`,
   bcol(RIGHT.SF,"Semifinále"),bcol(RIGHT.QF,"Štvrťfinále"),bcol(RIGHT.R16,"Osemfinále"),bcol(RIGHT.R32,"Šestnásťfinále"),
 ].join("");
 $("s-pavuk").innerHTML=`<p class="note" style="margin:4px 2px">🕸️ Vyraďovací pavúk — finále v strede. Posúvaj do strán. Výsledky a postupujúci sa dopĺňajú po odohraní zápasov.</p><div class="bracket">${cols}</div>`;
}

// ================= ADMIN =================
function renderAdmin(){
 if(sessionStorage.getItem("adm")!=="1"){
   $("s-adm").innerHTML=`<div class="card"><p class="note">Zadaj admin PIN (len pre teba — zadávanie výsledkov).</p>
     <input type="password" id="pin" placeholder="PIN"><button class="btn" onclick="checkPin()">Vstúpiť</button></div>`;
   return;
 }
 let h=`<div class="card"><div style="font-weight:700;margin-bottom:6px">🗳️ Hlasovanie: 7 bodov pre Peta (Kanada–Maroko)</div><div id="pollAdminBody" class="note">Načítavam…</div></div>
   <p class="note">Zadaj skutočné výsledky. Po uložení sa tabuľka prepočíta a daný zápas sa hráčom zamkne.</p>`;
 M.forEach(m=>{const[no,A,B,when]=m;const R=RESULTS[no]||{};
  h+=`<div class="card"><div class="mhead"><span>M${no} · ${when}</span><span>${R.finished?'<span class="fin">✓ uložené</span>':''}</span></div>
   <div class="teams"><div class="tn r">${A}${flag(A)}</div>
     <div class="sc"><input type="number" min="0" id="Ra${no}" value="${R.t1_90??''}"><span class="x">:</span><input type="number" min="0" id="Rb${no}" value="${R.t2_90??''}"></div>
     <div class="tn">${flag(B)}${B}</div></div>
   <div class="extra"><div class="row"><label><input type="checkbox" id="Ret${no}" ${R.went_et?'checked':''}> predĺženie</label>
     <span class="sc"><input type="number" min="0" id="Rae${no}" value="${R.t1_et??''}"><span class="x">:</span><input type="number" min="0" id="Rbe${no}" value="${R.t2_et??''}"></span></div>
   <div class="row"><label><input type="checkbox" id="Rpen${no}" ${R.went_pens?'checked':''}> penalty</label>
     <span class="sc"><input type="number" min="0" id="Rpa${no}" value="${R.pen_t1??''}"><span class="x">:</span><input type="number" min="0" id="Rpb${no}" value="${R.pen_t2??''}"></span></div></div>
   <button class="btn gold" style="margin-top:10px;padding:10px" onclick="saveResult(${no})">Uložiť výsledok M${no}</button></div>`;
 });

async function loadPollAdmin(){
 const{data}=await sb.from("predictions").select("player,advancer,created_at").eq("match_no",POLL_NO).order("created_at");
 const rows=data||[]; const el=$("pollAdminBody"); if(!el)return;
 const yes=rows.filter(r=>r.advancer==='áno').length, no=rows.filter(r=>r.advancer==='nie').length;
 let b=`<div style="margin-bottom:8px"><b style="color:#4caf72">Áno: ${yes}</b> · <b style="color:#e07a7a">Nie: ${no}</b> · spolu ${rows.length}</div>`;
 if(rows.length){
   b+='<table style="font-size:.85rem"><thead><tr><th>Hráč</th><th>Hlas</th></tr></thead><tbody>';
   rows.forEach(r=>{b+=`<tr><td>${esc(r.player)}</td><td>${r.advancer==='áno'?'✅ Áno':(r.advancer==='nie'?'❌ Nie':esc(r.advancer||'?'))}</td></tr>`;});
   b+='</tbody></table>';
 } else b='Zatiaľ nikto nehlasoval.';
 el.innerHTML=b;
}
function checkPin(){if($("pin").value===ADMIN_PIN){sessionStorage.setItem("adm","1");renderAdmin();}else toast("Zlý PIN");}
async function saveResult(no){
 const[A,B]=TEAM[no];
 const a=iv($("Ra"+no).value),b=iv($("Rb"+no).value);
 if(a==null||b==null){toast("Zadaj skóre 90'");return;}
 const went_et=$("Ret"+no).checked, ae=iv($("Rae"+no).value),be=iv($("Rbe"+no).value);
 const went_pens=$("Rpen"+no).checked, pa=iv($("Rpa"+no).value),pb=iv($("Rpb"+no).value);
 let pen_winner=null;
 if(went_pens){pen_winner = (pa!=null&&pb!=null) ? (pa>pb?A:B) : null;}
 const advancer=advFromScores(a,b,went_et?ae:null,went_et?be:null,pen_winner,no);
 if(!advancer){toast("Nejasný postupujúci — doplň predĺženie/penalty");return;}
 const row={match_no:no,t1_90:a,t2_90:b,went_et,t1_et:went_et?ae:null,t2_et:went_et?be:null,
   went_pens,pen_t1:went_pens?pa:null,pen_t2:went_pens?pb:null,advancer,finished:true,updated_at:new Date().toISOString()};
 const{error}=await sb.from("results").upsert(row,{onConflict:"match_no"});
 if(error){toast("Chyba: "+error.message);return;}
 RESULTS[no]=row; toast("Výsledok M"+no+" uložený ✅");
}
