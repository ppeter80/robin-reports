<!-- Practeo Admin — Faktúry (Etapa 1, prototyp, lokálne dáta) -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Practeo Admin — Faktúry</title>
<style>
:root{--bg:#0b0d12;--card:#141821;--line:#252b36;--txt:#e6e9ef;--mut:#8a90a0;--acc:#4c7dff;--grn:#2fbf6b;--red:#e0715f;--gold:#e6c86a}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:15px}
header{background:#0d1017;border-bottom:1px solid var(--line);padding:12px 14px;position:sticky;top:0;z-index:5}
h1{margin:0;font-size:1.05rem;display:flex;align-items:center;gap:8px}
h1 .tag{font-size:.62rem;color:var(--mut);border:1px solid var(--line);padding:2px 6px;border-radius:6px;font-weight:400}
nav{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
nav button{flex:1;min-width:90px;background:#11151d;color:var(--mut);border:1px solid var(--line);padding:9px;border-radius:9px;font-weight:600;cursor:pointer;font-size:.85rem}
nav button.on{background:var(--acc);color:#fff;border-color:var(--acc)}
main{max-width:820px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
label{display:block;font-size:.78rem;color:var(--mut);margin:8px 0 3px}
input,select,textarea{width:100%;background:#0f131a;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px;font-size:.9rem;font-family:inherit}
textarea{min-height:52px;resize:vertical}
.row{display:flex;gap:8px}.row>*{flex:1}
button.act{background:var(--acc);color:#fff;border:none;border-radius:9px;padding:11px 14px;font-weight:700;cursor:pointer;font-size:.9rem}
button.ghost{background:#11151d;color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:9px 12px;cursor:pointer;font-size:.85rem}
button.mini{background:none;border:none;color:var(--mut);cursor:pointer;font-size:.85rem}
.mut{color:var(--mut);font-size:.82rem}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--line)}
th{color:var(--mut);font-weight:600;font-size:.72rem}
.r{text-align:right}
.pill{display:inline-block;font-size:.68rem;padding:2px 7px;border-radius:20px}
.pill.pd{background:rgba(47,191,107,.15);color:var(--grn)}
.pill.un{background:rgba(224,113,95,.15);color:var(--red)}
.itrow{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.itrow input{font-size:.82rem;padding:7px}
.itrow .d{flex:3}.itrow .q{flex:1}.itrow .p{flex:1.4}.itrow .x{flex:0 0 auto}
.tot{display:flex;justify-content:space-between;padding:5px 0;font-size:.9rem}
.tot.big{font-weight:800;font-size:1.1rem;border-top:1px solid var(--line);margin-top:6px;padding-top:8px}
.help{background:rgba(76,125,255,.08);border:1px solid rgba(76,125,255,.25);border-radius:9px;padding:9px 11px;font-size:.8rem;color:#b9c4e6;margin-bottom:10px}
/* Faktúra na tlač */
#print{display:none}
@media print{
  body{background:#fff}
  header,main,#toast{display:none!important}
  #print{display:block!important;color:#000;font-size:12px;padding:0}
}
#print .inv{color:#000;background:#fff;max-width:800px;margin:0 auto;padding:24px;font-family:Arial,sans-serif}
#print h2{font-size:22px;margin:0 0 2px}
#print .box{border:1px solid #bbb;border-radius:6px;padding:10px;font-size:12px}
#print table{font-size:12px}#print th,#print td{border-bottom:1px solid #ddd;color:#000}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#222836;color:#fff;padding:10px 16px;border-radius:10px;opacity:0;transition:.2s;font-size:.85rem;z-index:20}
#toast.show{opacity:1}
</style>

<header>
  <h1>📊 Practeo Admin <span class="tag">Faktúry · prototyp</span></h1>
  <nav>
    <button id="t-dash" onclick="tab('dash')">📈 Dashboard</button>
    <button id="t-fak" class="on" onclick="tab('fak')">🧾 Faktúry</button>
    <button id="t-new" onclick="tab('new')">➕ Faktúra</button>
    <button id="t-nak" onclick="tab('nak')">🧾 Náklady</button>
    <button id="t-cli" onclick="tab('cli')">👥 Klienti</button>
    <button id="t-set" onclick="tab('set')">⚙️ Nastavenia</button>
  </nav>
</header>
<main>
  <div id="s-dash" style="display:none"></div>
  <div id="s-fak"></div>
  <div id="s-new" style="display:none"></div>
  <div id="s-nak" style="display:none"></div>
  <div id="s-cli" style="display:none"></div>
  <div id="s-set" style="display:none"></div>
</main>
<div id="print"></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const $=id=>document.getElementById(id);
const LS={get:(k,d)=>{try{return JSON.parse(localStorage.getItem('practeo_'+k))??d}catch(e){return d}},set:(k,v)=>localStorage.setItem('practeo_'+k,JSON.stringify(v))};
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const eur=n=>(Math.round((+n||0)*100)/100).toLocaleString('sk-SK',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200)}
// režimy DPH (2026): 23 základná, 19 a 5 znížené, oslobodené (§38 prenájom), reverse charge
const DPHM={
 none:{r:0,lbl:'Neplatiteľ DPH (bez DPH)'},
 sk23:{r:0.23,lbl:'Platiteľ SK — 23 % (poradenstvo, tovar)'},
 sk:{r:0.23,lbl:'Platiteľ SK — 23 %'},
 sk5:{r:0.05,lbl:'Znížená 5 % (ubytovanie / apartmán / krátkodobý prenájom)'},
 sk19:{r:0.19,lbl:'Znížená 19 %'},
 exempt:{r:0,lbl:'Oslobodené — dlhodobý prenájom nehnuteľnosti (§38)'},
 rc:{r:0,lbl:'Reverse charge (do ČR/EÚ) — prenesenie daňovej povinnosti'}
};
function dphNote(m){
 if(m==='rc')return'Prenesenie daňovej povinnosti — Reverse charge. Daň odvedie príjemca (čl. 196 smernice Rady 2006/112/ES). Miesto dodania podľa § 15 ods. 1 zákona o DPH.';
 if(m==='exempt')return'Oslobodené od dane podľa § 38 zákona o DPH (nájom nehnuteľnosti).';
 if(m==='none')return'Dodávateľ nie je platiteľom DPH.';
 return'';
}

// ---- default dodávateľ (Practeo) ----
let SUP=LS.get('supplier',{meno:'Practeo, s.r.o.',sidlo:'SNP 1786/72, 069 01 Snina',ico:'',dic:'',icdph:'',iban:'',konatel:'Ing. Peter Pčola'});
let CLI=LS.get('clients',[]);
let INV=LS.get('invoices',[]);
let EXP=LS.get('expenses',[]);
const KAT=['Nájom / sídlo','Účtovníctvo / právne','Technika a softvér / AI','Auto / PHM / servis','Telefón / internet','Cestovné / diéty','Marketing / web','Vzdelávanie / knihy','Poistenie','Bankové poplatky','Materiál / kancelária','Nehnuteľnosti (náklady)','Ostatné'];
const VRATE={none:0,'23':0.23,'5':0.05,'19':0.19};

let cur=null; // rozpracovaná faktúra
function newInvoiceNo(){
 const y=new Date().getFullYear();
 const n=INV.filter(i=>i.no&&i.no.startsWith(y+'')).length+1;
 return `${y}${String(n).padStart(3,'0')}`;
}

function tab(t){for(const k of ['dash','fak','new','nak','cli','set']){$('s-'+k).style.display=k===t?'':'none';$('t-'+k).classList.toggle('on',k===t)}
 if(t==='dash')renderDash();if(t==='fak')renderFak();if(t==='new')renderNew();if(t==='nak')renderNak();if(t==='cli')renderCli();if(t==='set')renderSet()}

// ===== NASTAVENIA =====
function renderSet(){
 $('s-set').innerHTML=`<div class="card"><b>Údaje dodávateľa (Practeo)</b><p class="mut">Zobrazia sa na každej faktúre. Doplň IČO/DIČ/IČ DPH/IBAN po zápise.</p>
 <label>Obchodné meno</label><input id="su_meno" value="${esc(SUP.meno)}">
 <label>Sídlo</label><input id="su_sidlo" value="${esc(SUP.sidlo)}">
 <div class="row"><div><label>IČO</label><input id="su_ico" value="${esc(SUP.ico)}"></div><div><label>DIČ</label><input id="su_dic" value="${esc(SUP.dic)}"></div></div>
 <div class="row"><div><label>IČ DPH</label><input id="su_icdph" value="${esc(SUP.icdph)}" placeholder="SK..."></div><div><label>IBAN</label><input id="su_iban" value="${esc(SUP.iban)}"></div></div>
 <label>Konateľ</label><input id="su_kon" value="${esc(SUP.konatel)}">
 <div style="margin-top:12px"><button class="act" onclick="saveSup()">Uložiť</button></div></div>`;
}
function saveSup(){SUP={meno:$('su_meno').value,sidlo:$('su_sidlo').value,ico:$('su_ico').value,dic:$('su_dic').value,icdph:$('su_icdph').value,iban:$('su_iban').value,konatel:$('su_kon').value};LS.set('supplier',SUP);toast('Uložené ✅')}

// ===== KLIENTI =====
function renderCli(){
 let h=`<div class="card"><b>Nový klient</b>
 <label>Názov / meno</label><input id="cl_meno">
 <label>Adresa</label><input id="cl_adr">
 <div class="row"><div><label>IČO</label><input id="cl_ico"></div><div><label>IČ DPH</label><input id="cl_icdph" placeholder="napr. CZ..."></div></div>
 <label>Krajina</label><select id="cl_kraj"><option>Slovensko</option><option>Česko</option><option>iná EÚ</option><option>mimo EÚ</option></select>
 <div style="margin-top:10px"><button class="act" onclick="addCli()">Pridať klienta</button></div></div>
 <div class="card"><b>Klienti (${CLI.length})</b>`;
 if(!CLI.length)h+='<p class="mut">Zatiaľ žiadni klienti.</p>';
 CLI.forEach((c,i)=>{h+=`<div style="border-bottom:1px solid var(--line);padding:7px 0"><b>${esc(c.meno)}</b> <span class="mut">· ${esc(c.kraj)}</span><br><span class="mut">${esc(c.adr||'')} ${c.icdph?'· IČ DPH '+esc(c.icdph):''}</span> <button class="mini" onclick="delCli(${i})">✕ zmazať</button></div>`});
 h+='</div>';$('s-cli').innerHTML=h;
}
function addCli(){const m=$('cl_meno').value.trim();if(!m){toast('Zadaj názov');return}CLI.push({meno:m,adr:$('cl_adr').value,ico:$('cl_ico').value,icdph:$('cl_icdph').value,kraj:$('cl_kraj').value});LS.set('clients',CLI);renderCli();toast('Klient pridaný ✅')}
function delCli(i){CLI.splice(i,1);LS.set('clients',CLI);renderCli()}

// ===== NOVÁ FAKTÚRA =====
function renderNew(){
 if(!cur)cur={no:newInvoiceNo(),cli:null,dvyst:today(),ddod:today(),dspl:plus(14),items:[{d:'',q:1,p:0}],dph:'rc',paid:false};
 const opt=CLI.map((c,i)=>`<option value="${i}" ${cur.cli===i?'selected':''}>${esc(c.meno)}</option>`).join('');
 let h=`<div class="card">
  <div class="row"><div><label>Číslo faktúry</label><input id="f_no" value="${esc(cur.no)}"></div>
  <div><label>Klient</label><select id="f_cli" onchange="cur.cli=this.value===''?null:+this.value"><option value="">— vyber —</option>${opt}</select></div></div>
  <div class="row"><div><label>Dátum vystavenia</label><input type="date" id="f_dvyst" value="${cur.dvyst}"></div>
  <div><label>Dátum dodania</label><input type="date" id="f_ddod" value="${cur.ddod}"></div>
  <div><label>Splatnosť</label><input type="date" id="f_dspl" value="${cur.dspl}"></div></div>
  <label>Režim DPH</label>
  <select id="f_dph" onchange="cur.dph=this.value;renderNew()">
    ${['none','sk23','sk5','sk19','exempt','rc'].map(k=>`<option value="${k}" ${cur.dph===k||(cur.dph==='sk'&&k==='sk23')?'selected':''}>${DPHM[k].lbl}</option>`).join('')}
  </select>
  ${cur.dph==='rc'?'<div class="help">Bez DPH — prenesenie daňovej povinnosti. Uveď IČ DPH klienta.</div>':''}
  ${cur.dph==='exempt'?'<div class="help">Bez DPH — oslobodené (§38, dlhodobý nájom nehnuteľnosti). Pozn.: krátkodobé ubytovanie NIE je oslobodené — použi 5 %.</div>':''}
  ${cur.dph==='sk5'?'<div class="help">Znížená sadzba 5 % — ubytovacie služby / krátkodobý (apartmánový) prenájom.</div>':''}
  <label style="margin-top:10px">Položky</label><div id="f_items"></div>
  <button class="ghost" onclick="cur.items.push({d:'',q:1,p:0});syncItems();renderNew()" style="margin-top:4px">+ pridať položku</button>
  <div style="margin-top:12px" id="f_tot"></div>
  <div class="row" style="margin-top:12px"><button class="act" onclick="saveInv()">💾 Uložiť faktúru</button><button class="ghost" onclick="previewInv(cur)">👁️ Náhľad / PDF</button></div>
  <div style="margin-top:6px"><button class="mini" onclick="cur=null;renderNew()">↺ nová prázdna</button></div>
 </div>`;
 $('s-new').innerHTML=h;drawItems();drawTot();
 ['f_no','f_dvyst','f_ddod','f_dspl'].forEach(id=>{const k={f_no:'no',f_dvyst:'dvyst',f_ddod:'ddod',f_dspl:'dspl'}[id];$(id).oninput=e=>cur[k]=e.target.value});
}
function drawItems(){$('f_items').innerHTML=cur.items.map((it,i)=>`<div class="itrow">
 <input class="d" placeholder="Popis položky" value="${esc(it.d)}" oninput="cur.items[${i}].d=this.value">
 <input class="q" type="number" step="0.01" value="${it.q}" oninput="cur.items[${i}].q=+this.value;drawTot()">
 <input class="p" type="number" step="0.01" placeholder="cena/j." value="${it.p}" oninput="cur.items[${i}].p=+this.value;drawTot()">
 <button class="mini x" onclick="cur.items.splice(${i},1);renderNew()">✕</button></div>`).join('')}
function syncItems(){}
function totals(inv){const base=inv.items.reduce((s,it)=>s+(+it.q||0)*(+it.p||0),0);const rate=(DPHM[inv.dph]||{}).r||0;const dph=base*rate;return{base,dph,total:base+dph,rate}}
function drawTot(){const t=totals(cur);$('f_tot').innerHTML=`<div class="tot"><span>Základ</span><b>${eur(t.base)}</b></div>${t.rate>0?`<div class="tot"><span>DPH ${Math.round(t.rate*100)} %</span><b>${eur(t.dph)}</b></div>`:''}<div class="tot big"><span>Spolu</span><span>${eur(t.total)}</span></div>`}
function saveInv(){cur.no=$('f_no').value;if(cur.cli==null){toast('Vyber klienta');return}if(!cur.items.some(it=>it.d)){toast('Pridaj aspoň 1 položku');return}
 const ex=INV.findIndex(i=>i.id===cur.id);if(!cur.id)cur.id=Date.now();
 if(ex>=0)INV[ex]=cur;else INV.unshift(cur);LS.set('invoices',INV);toast('Faktúra uložená ✅');cur=null;tab('fak')}

// ===== ZOZNAM FAKTÚR =====
function renderFak(){
 let h='';
 if(!SUP.ico)h+='<div class="help">Tip: v ⚙️ Nastaveniach doplň IČO/DIČ/IČ DPH/IBAN Practeo — po zápise firmy.</div>';
 const paid=INV.filter(i=>i.paid).reduce((s,i)=>s+totals(i).total,0);
 const unpaid=INV.filter(i=>!i.paid).reduce((s,i)=>s+totals(i).total,0);
 h+=`<div class="card"><div class="row"><div><div class="mut">Vystavené</div><b>${INV.length}</b></div><div><div class="mut">Zaplatené</div><b style="color:var(--grn)">${eur(paid)}</b></div><div><div class="mut">Nezaplatené</div><b style="color:var(--red)">${eur(unpaid)}</b></div></div></div>`;
 h+='<div class="card"><b>Faktúry</b>';
 if(!INV.length)h+='<p class="mut">Zatiaľ žiadne. Vytvor v „➕ Nová faktúra".</p>';
 else{h+='<table><thead><tr><th>Číslo</th><th>Klient</th><th class="r">Suma</th><th></th></tr></thead><tbody>';
 INV.forEach(i=>{const c=CLI[i.cli];h+=`<tr><td>${esc(i.no)}<br><span class="mut">${esc(i.dvyst)}</span></td><td>${esc(c?c.meno:'—')}<br><span class="pill ${i.paid?'pd':'un'}">${i.paid?'zaplatená':'nezaplatená'}</span></td><td class="r"><b>${eur(totals(i).total)}</b></td>
 <td class="r"><button class="mini" onclick="previewInv(INV.find(x=>x.id===${i.id}))">👁️</button><button class="mini" onclick="editInv(${i.id})">✏️</button><button class="mini" onclick="togglePaid(${i.id})">${i.paid?'↺':'✓'}</button><button class="mini" onclick="delInv(${i.id})">✕</button></td></tr>`});
 h+='</tbody></table>'}
 h+='</div>';$('s-fak').innerHTML=h;
}
function editInv(id){cur=JSON.parse(JSON.stringify(INV.find(i=>i.id===id)));tab('new')}
function togglePaid(id){const i=INV.find(x=>x.id===id);i.paid=!i.paid;LS.set('invoices',INV);renderFak()}
function delInv(id){if(!confirm('Zmazať faktúru?'))return;INV=INV.filter(i=>i.id!==id);LS.set('invoices',INV);renderFak()}

// ===== NÁHĽAD / PDF =====
function previewInv(inv){
 const c=CLI[inv.cli]||{};const t=totals(inv);
 const rows=inv.items.filter(it=>it.d).map(it=>`<tr><td>${esc(it.d)}</td><td class="r">${it.q}</td><td class="r">${eur(it.p)}</td><td class="r">${eur((+it.q||0)*(+it.p||0))}</td></tr>`).join('');
 $('print').innerHTML=`<div class="inv">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
   <div><h2>FAKTÚRA</h2><div>č. ${esc(inv.no)}</div></div>
   <div style="text-align:right;font-size:12px">Dátum vystavenia: ${esc(inv.dvyst)}<br>Dátum dodania: ${esc(inv.ddod)}<br><b>Splatnosť: ${esc(inv.dspl)}</b></div>
  </div>
  <div style="display:flex;gap:14px;margin:14px 0">
   <div class="box" style="flex:1"><b>Dodávateľ</b><br>${esc(SUP.meno)}<br>${esc(SUP.sidlo)}<br>IČO: ${esc(SUP.ico)||'—'} · DIČ: ${esc(SUP.dic)||'—'}<br>IČ DPH: ${esc(SUP.icdph)||'—'}<br>IBAN: ${esc(SUP.iban)||'—'}</div>
   <div class="box" style="flex:1"><b>Odberateľ</b><br>${esc(c.meno||'—')}<br>${esc(c.adr||'')}<br>IČO: ${esc(c.ico)||'—'}<br>IČ DPH: ${esc(c.icdph)||'—'}<br>${esc(c.kraj||'')}</div>
  </div>
  <table style="width:100%;border-collapse:collapse"><thead><tr><th style="text-align:left">Popis</th><th class="r">Množ.</th><th class="r">Cena/j.</th><th class="r">Spolu</th></tr></thead><tbody>${rows}</tbody></table>
  <div style="display:flex;justify-content:flex-end;margin-top:12px"><table style="min-width:240px">
    <tr><td>Základ</td><td class="r">${eur(t.base)}</td></tr>
    ${t.rate>0?`<tr><td>DPH ${Math.round(t.rate*100)} %</td><td class="r">${eur(t.dph)}</td></tr>`:''}
    <tr><td><b>SPOLU</b></td><td class="r"><b>${eur(t.total)}</b></td></tr></table></div>
  ${dphNote(inv.dph)?`<div class="box" style="margin-top:12px;font-size:11px">${dphNote(inv.dph)}</div>`:''}
  <div style="margin-top:24px;font-size:12px">Vystavil: ${esc(SUP.konatel)}</div>
 </div>`;
 window.print();
}

// ===== NÁKLADY =====
let curExpFoto=null;
function renderNak(){
 let h=`<div class="card"><b>Nový náklad</b>
  <div class="row"><div><label>Dátum</label><input type="date" id="e_dat" value="${today()}"></div>
  <div><label>Suma spolu (€)</label><input type="number" step="0.01" id="e_sum"></div></div>
  <label>Dodávateľ</label><input id="e_dod">
  <label>Popis</label><input id="e_pop">
  <div class="row"><div><label>Kategória</label><select id="e_kat">${KAT.map(k=>`<option>${esc(k)}</option>`).join('')}</select></div>
  <div><label>DPH na vstupe</label><select id="e_dph"><option value="none">bez DPH</option><option value="23">23 %</option><option value="5">5 %</option><option value="19">19 %</option></select></div></div>
  <label style="margin-top:8px"><input type="checkbox" id="e_uzn" checked style="width:auto;margin-right:6px;vertical-align:middle">Uznateľný náklad</label>
  <label>Doklad (foto) — appka ho prečíta a predvyplní</label><input type="file" accept="image/*" id="e_foto" onchange="loadFoto(this)">
  <div id="e_fotoprev"></div>
  <div class="help">📸 Odfoť doklad → appka prečíta <b>sumu a dátum</b>, ty len skontroluj a oprav. (Prvé čítanie chvíľu trvá — sťahuje slovenský slovník; potom je rýchle.)</div>
  <div style="margin-top:8px"><button class="act" onclick="addExp()">Pridať náklad</button></div></div>
  <div class="card"><b>Náklady (${EXP.length})</b>`;
 if(!EXP.length)h+='<p class="mut">Zatiaľ žiadne.</p>';
 else{h+='<table><thead><tr><th>Dátum</th><th>Dodávateľ / kategória</th><th class="r">Suma</th><th></th></tr></thead><tbody>';
  EXP.forEach(e=>{h+=`<tr><td>${esc(e.dat)}</td><td>${esc(e.dod||'—')}<br><span class="mut">${esc(e.kat)}${e.uzn?'':' · NEuzn.'}</span></td><td class="r"><b>${eur(e.sum)}</b>${e.dph!=='none'?`<br><span class="mut">DPH ${esc(e.dph)}%</span>`:''}</td><td class="r">${e.foto?`<button class="mini" onclick="viewFoto(${e.id})">🖼️</button>`:''}<button class="mini" onclick="delExp(${e.id})">✕</button></td></tr>`});
  h+='</tbody></table>'}
 h+='</div>';$('s-nak').innerHTML=h;curExpFoto=null;
}
function loadFoto(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{
  const cv=document.createElement('canvas');const mx=1200;let w=img.width,ht=img.height;if(w>mx){ht=Math.round(ht*mx/w);w=mx}cv.width=w;cv.height=ht;cv.getContext('2d').drawImage(img,0,0,w,ht);
  try{curExpFoto=cv.toDataURL('image/jpeg',0.6)}catch(e){curExpFoto=null}
  $('e_fotoprev').innerHTML=(curExpFoto?`<img src="${curExpFoto}" style="max-width:150px;border-radius:8px;margin-top:6px">`:'')+'<div id="ocrst" class="mut" style="margin-top:6px">📸 Čítam doklad… (prvýkrát to chvíľu trvá)</div>';
  runOCR(cv.toDataURL('image/jpeg',0.85));
 };img.src=ev.target.result};r.readAsDataURL(f)}
function runOCR(dataUrl){
 const st=()=>$('ocrst');
 if(typeof Tesseract==='undefined'){if(st())st().textContent='OCR nedostupné — zadaj údaje ručne.';return}
 Tesseract.recognize(dataUrl,'slk+eng').then(({data})=>{
   const p=parseDoklad(data.text||'');
   if(p.sum&&$('e_sum')&&!$('e_sum').value)$('e_sum').value=p.sum;
   if(p.date&&$('e_dat'))$('e_dat').value=p.date;
   if(p.dod&&$('e_dod')&&!$('e_dod').value)$('e_dod').value=p.dod;
   if(st())st().innerHTML='✅ Prečítané — skontroluj sumu/dátum a oprav, ak treba.';
 }).catch(()=>{if(st())st().textContent='Nepodarilo sa prečítať — zadaj ručne.'});
}
function parseDoklad(t){
 const res={};
 const nums=(t.match(/\d[\d .]*[,.]\d{2}/g)||[]).map(x=>{let s=x.trim().replace(/\s/g,'');if(s.indexOf(',')>-1){s=s.replace(/\./g,'').replace(',','.')}return parseFloat(s)}).filter(n=>!isNaN(n)&&n>0&&n<1e7);
 if(nums.length)res.sum=Math.max(...nums);
 const dm=t.match(/(\d{1,2})[.\/-]\s?(\d{1,2})[.\/-]\s?(\d{2,4})/);
 if(dm){let y=dm[3];if(y.length===2)y='20'+y;res.date=`${y}-${String(+dm[2]).padStart(2,'0')}-${String(+dm[1]).padStart(2,'0')}`}
 const line=(t.split('\n').map(l=>l.trim()).filter(l=>l.length>2&&/[A-Za-zÁ-Žá-ž]/.test(l))[0]||'').slice(0,40);
 if(line)res.dod=line;
 return res;
}
function addExp(){const s=+$('e_sum').value;if(!s){toast('Zadaj sumu');return}try{EXP.unshift({id:Date.now(),dat:$('e_dat').value,dod:$('e_dod').value,pop:$('e_pop').value,kat:$('e_kat').value,sum:s,dph:$('e_dph').value,uzn:$('e_uzn').checked,foto:curExpFoto});LS.set('expenses',EXP)}catch(e){toast('Chyba: fotka je asi priveľká');return}toast('Náklad pridaný ✅');renderNak()}
function delExp(id){EXP=EXP.filter(e=>e.id!==id);LS.set('expenses',EXP);renderNak()}
function viewFoto(id){const e=EXP.find(x=>x.id===id);if(e&&e.foto){const w=window.open();w.document.write('<img src="'+e.foto+'" style="max-width:100%">')}}

// ===== DASHBOARD / DPH PREHĽAD =====
function renderDash(){
 const trzby=INV.reduce((s,i)=>s+totals(i).base,0);
 const dphOut=INV.reduce((s,i)=>s+totals(i).dph,0);
 const rcEU=INV.filter(i=>i.dph==='rc').reduce((s,i)=>s+totals(i).base,0);
 const naklUzn=EXP.filter(e=>e.uzn).reduce((s,e)=>s+(+e.sum||0),0);
 const dphIn=EXP.reduce((s,e)=>{const r=VRATE[e.dph]||0;const t=+e.sum||0;return s+(t-t/(1+r))},0);
 const zisk=trzby-naklUzn;const danPO=Math.max(zisk*0.10,0);const saldo=dphOut-dphIn;
 $('s-dash').innerHTML=`<div class="card"><b>📈 Prehľad</b> <span class="mut">(všetky doklady)</span>
  <div class="tot"><span>Tržby (základ faktúr)</span><b>${eur(trzby)}</b></div>
  <div class="tot"><span>Náklady (uznateľné)</span><b>${eur(naklUzn)}</b></div>
  <div class="tot big"><span>Zisk (odhad)</span><span>${eur(zisk)}</span></div>
  <div class="tot"><span>Odhad dane PO (10 %)</span><b>${eur(danPO)}</b></div></div>
  <div class="card"><b>🧾 DPH prehľad</b> <span class="mut">(podklad pre účtovníka)</span>
  <div class="tot"><span>DPH na výstupe (z faktúr)</span><b>${eur(dphOut)}</b></div>
  <div class="tot"><span>DPH na vstupe (z nákladov)</span><b>${eur(dphIn)}</b></div>
  <div class="tot big"><span>${saldo>=0?'DPH na odvod':'Nadmerný odpočet'}</span><span>${eur(Math.abs(saldo))}</span></div>
  <div class="tot" style="margin-top:8px;border-top:1px solid var(--line);padding-top:8px"><span>Reverse-charge dodania do EÚ (VIES)</span><b>${eur(rcEU)}</b></div>
  <p class="mut" style="margin-top:8px">Podklad — oficiálne DPH priznanie, kontrolný a súhrnný výkaz (VIES) podáva účtovník z týchto čísel.</p></div>`;
}

// ---- utils ----
function today(){return new Date().toISOString().slice(0,10)}
function plus(days){const d=new Date();d.setDate(d.getDate()+days);return d.toISOString().slice(0,10)}

renderFak();
