<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Tipovačka MS 2026 — vyraďovacia fáza</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#000;--card:#111317;--line:#23262d;--accent:#4ea1ff;--gold:#ffce4a;--green:#34d399;--muted:#8a90a0;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:#eceef2;font-family:-apple-system,Segoe UI,Roboto,system-ui,sans-serif;padding:0 0 80px}
header{position:sticky;top:0;background:#000;border-bottom:1px solid var(--line);padding:12px 14px;z-index:10}
h1{font-size:1.05rem;margin:0}
.sub{color:var(--muted);font-size:.72rem;margin-top:2px}
.wrap{max-width:760px;margin:0 auto;padding:12px 12px}
nav{display:flex;gap:6px;margin-top:10px}
nav button{flex:1;background:#16181d;color:#cfd3dc;border:1px solid var(--line);border-radius:10px;padding:9px 6px;font-size:.82rem;font-weight:600}
nav button.on{background:var(--accent);color:#001;border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0}
.mhead{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:var(--muted);margin-bottom:8px}
.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
.tn{font-weight:700;font-size:.95rem}
.tn.r{text-align:right}
.sc{display:flex;gap:6px;align-items:center;justify-content:center}
input[type=number]{width:46px;height:42px;text-align:center;font-size:1.1rem;background:#0c0e12;color:#fff;border:1px solid var(--line);border-radius:9px}
input[type=text]{width:100%;height:44px;background:#0c0e12;color:#fff;border:1px solid var(--line);border-radius:10px;padding:0 12px;font-size:1rem}
.x{color:var(--muted);font-weight:700}
.extra{margin-top:9px;padding-top:9px;border-top:1px dashed var(--line);font-size:.82rem;color:#cdd2db}
.extra .row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:6px 0}
select{height:40px;background:#0c0e12;color:#fff;border:1px solid var(--line);border-radius:9px;padding:0 8px;font-size:.9rem}
.adv{font-size:.78rem;color:var(--green);margin-top:8px;text-align:center}
.locked{opacity:.5;pointer-events:none}
.btn{display:block;width:100%;background:var(--accent);color:#001018;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:800;margin:14px 0}
.btn.gold{background:var(--gold)}
.note{color:var(--muted);font-size:.78rem;line-height:1.5}
table{width:100%;border-collapse:collapse;font-size:.86rem}
th,td{padding:9px 8px;border-bottom:1px solid var(--line);text-align:left}
th{color:var(--accent);font-size:.74rem;text-transform:uppercase;letter-spacing:.03em}
td.r,th.r{text-align:right}
.rank{color:var(--muted);width:26px}
.me{color:var(--gold)}
.pill{display:inline-block;background:#16181d;border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-size:.72rem;color:var(--muted)}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#16181d;border:1px solid var(--line);padding:11px 16px;border-radius:12px;font-size:.86rem;opacity:0;transition:.25s;z-index:50}
.toast.show{opacity:1}
.fin{color:var(--gold);font-size:.7rem}
details{margin:6px 0}summary{cursor:pointer;color:var(--accent);font-size:.82rem}
.bd{font-size:.78rem;color:var(--muted);margin:4px 0 0 4px}
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding:0">
    <h1>🏆 Tipovačka MS 2026 — vyraďovačka</h1>
    <div class="sub">Postup 1b · góly 90' 1b/tím · predĺženie 1b/tím · penalty 1b (víťaz)/2b (presne) · všetko presne +2</div>
    <nav>
      <button id="tab-tip" class="on" onclick="showTab('tip')">✍️ Tipuj</button>
      <button id="tab-tab" onclick="showTab('tab')">📊 Tabuľka</button>
      <button id="tab-adm" onclick="showTab('adm')">🔒 Admin</button>
    </nav>
  </div>
</header>
<div class="wrap">
  <section id="s-tip"></section>
  <section id="s-tab" style="display:none"></section>
  <section id="s-adm" style="display:none"></section>
</div>
<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL="https://lultodbmyhawlpfgfhmg.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_c5ke1M0NDYzff_s7miJAHg_tFNM-Cn3";
const ADMIN_PIN="palo50";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

// match_no, team1, team2, when (Bratislava)
const M=[
 [73,"Južná Afrika","Kanada","ne 28.6. 21:00"],
 [76,"Brazília","Japonsko","po 29.6. 19:00"],
 [74,"Nemecko","Paraguaj","po 29.6. 22:30"],
 [75,"Holandsko","Maroko","ut 30.6. 03:00"],
 [78,"Pobr. Slonoviny","Nórsko","ut 30.6. 19:00"],
 [77,"Francúzsko","Švédsko","ut 30.6. 23:00"],
 [79,"Mexiko","Ekvádor","st 1.7. 03:00"],
 [80,"Anglicko","DR Kongo","st 1.7. 18:00"],
 [82,"Belgicko","Senegal","st 1.7. 22:00"],
 [81,"USA","Bosna a Herc.","št 2.7. 02:00"],
 [84,"Španielsko","Rakúsko","št 2.7. 21:00"],
 [83,"Portugalsko","Chorvátsko","pi 3.7. 01:00"],
 [85,"Švajčiarsko","Alžírsko","pi 3.7. 05:00"],
 [88,"Austrália","Egypt","pi 3.7. 20:00"],
 [86,"Argentína","Kapverdy","so 4.7. 00:00"],
 [87,"Kolumbia","Ghana","so 4.7. 03:30"],
];
const TEAM={};M.forEach(m=>TEAM[m[0]]=[m[1],m[2]]);
let RESULTS={}; // match_no -> result row
const $=id=>document.getElementById(id);
const iv=v=>{v=parseInt(v);return isNaN(v)?null:v;};
function toast(t){const e=$("toast");e.textContent=t;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),2200);}
function showTab(t){for(const k of["tip","tab","adm"]){$("s-"+k).style.display=k===t?"":"none";$("tab-"+k).classList.toggle("on",k===t);}if(t==="tab")loadBoard();if(t==="adm")renderAdmin();}

// ---- advancer logic from a score set ----
function advFromScores(t1_90,t2_90,t1_et,t2_et,pen_winner,m){
 const [A,B]=TEAM[m];
 if(t1_90!=null&&t2_90!=null&&t1_90!==t2_90) return t1_90>t2_90?A:B;
 if(t1_et!=null&&t2_et!=null&&t1_et!==t2_et) return t1_et>t2_et?A:B;
 if(pen_winner) return pen_winner;
 return null;
}

// ---- scoring (prediction P vs result R) ----
function scoreOne(P,R){
 if(!R||!R.finished) return null;
 let pts=0;
 const Radv=R.advancer;
 const Padv=advFromScores(P.t1_90,P.t2_90,P.t1_et,P.t2_et,P.pen_winner,P.match_no);
 const advOK=Padv&&Radv&&Padv===Radv; if(advOK)pts+=1;
 const g1=P.t1_90===R.t1_90, g2=P.t2_90===R.t2_90;
 if(g1)pts+=1; if(g2)pts+=1; const full90=g1&&g2;
 let etOK=true;
 if(R.went_et){ const e1=P.t1_et===R.t1_et,e2=P.t2_et===R.t2_et; if(e1)pts+=1; if(e2)pts+=1; etOK=e1&&e2&&P.t1_et!=null; }
 let penExact=false,penWin=false;
 if(R.went_pens){ penExact=(P.pen_t1===R.pen_t1&&P.pen_t2===R.pen_t2&&P.pen_t1!=null); penWin=(P.pen_winner&&P.pen_winner===R.advancer);
   if(penExact)pts+=2; else if(penWin)pts+=1; }
 let allExact=advOK&&full90;
 if(R.went_et)allExact=allExact&&(P.t1_et===R.t1_et&&P.t2_et===R.t2_et);
 if(R.went_pens)allExact=allExact&&penExact;
 if(allExact)pts+=2;
 return pts;
}

// ================= TIPUJ =================
async function loadResults(){const{data}=await sb.from("results").select("*");RESULTS={};(data||[]).forEach(r=>RESULTS[r.match_no]=r);}
function renderTip(){
 const name=localStorage.getItem("tip_name")||"";
 let h=`<div class="card"><label class="note">Tvoje meno (rovnaké pri každom odoslaní):</label>
   <input type="text" id="pname" placeholder="napr. Palo" value="${name.replace(/"/g,'&quot;')}" style="margin-top:6px"></div>`;
 M.forEach(m=>{
  const[no,A,B,when]=m; const fin=RESULTS[no]&&RESULTS[no].finished;
  h+=`<div class="card ${fin?'locked':''}" id="m${no}">
    <div class="mhead"><span>Zápas M${no} · ${when}</span><span>${fin?'<span class="fin">✓ odohraté</span>':''}</span></div>
    <div class="teams">
      <div class="tn r">${A}</div>
      <div class="sc"><input type="number" min="0" id="a${no}"><span class="x">:</span><input type="number" min="0" id="b${no}"></div>
      <div class="tn">${B}</div>
    </div>
    <div class="extra" id="ex${no}" style="display:none">
      <div class="row"><span>Po predĺžení (stav po 120')</span>
        <span class="sc"><input type="number" min="0" id="ae${no}"><span class="x">:</span><input type="number" min="0" id="be${no}"></span></div>
      <div class="row" id="penrow${no}" style="display:none"><span>Penalty</span>
        <span><select id="pw${no}"><option value="">— víťaz —</option><option value="${A}">${A}</option><option value="${B}">${B}</option></select>
        &nbsp;presne: <span class="sc"><input type="number" min="0" id="pa${no}"><span class="x">:</span><input type="number" min="0" id="pb${no}"></span></span></div>
    </div>
    <div class="adv" id="adv${no}"></div>
  </div>`;
 });
 h+=`<button class="btn" onclick="submitTips()">Odoslať moje tipy ✅</button>
   <p class="note">Tip vieš kedykoľvek prepísať (rovnakým menom) — kým sa zápas neodohrá. Po odohratí sa zamkne.</p>`;
 $("s-tip").innerHTML=h;
 M.forEach(m=>{const no=m[0];["a","b","ae","be"].forEach(p=>{const el=$(p+no);if(el)el.oninput=()=>onScoreChange(no);});const pw=$("pw"+no);if(pw)pw.onchange=()=>onScoreChange(no);});
}
function onScoreChange(no){
 const[A,B]=TEAM[no]; const a=iv($("a"+no).value),b=iv($("b"+no).value);
 const ex=$("ex"+no); const draw90=(a!=null&&b!=null&&a===b);
 ex.style.display=draw90?"":"none";
 let ae=null,be=null;
 if(draw90){ae=iv($("ae"+no).value);be=iv($("be"+no).value);}
 const drawET=(draw90&&ae!=null&&be!=null&&ae===be);
 $("penrow"+no).style.display=drawET?"":"none";
 const pw=drawET?($("pw"+no).value||null):null;
 const adv=advFromScores(a,b,ae,be,pw,no);
 $("adv"+no).textContent=adv?("Postupuje: "+adv):"";
}
async function submitTips(){
 const player=$("pname").value.trim();
 if(!player){toast("Zadaj meno");return;}
 localStorage.setItem("tip_name",player);
 const rows=[];
 for(const m of M){const no=m[0]; if(RESULTS[no]&&RESULTS[no].finished)continue;
   const a=iv($("a"+no).value),b=iv($("b"+no).value); if(a==null||b==null)continue;
   const ae=iv($("ae"+no).value),be=iv($("be"+no).value),pw=$("pw"+no).value||null;
   const pa=iv($("pa"+no).value),pb=iv($("pb"+no).value);
   rows.push({player,match_no:no,t1_90:a,t2_90:b,t1_et:ae,t2_et:be,pen_t1:pa,pen_t2:pb,pen_winner:pw,
     advancer:advFromScores(a,b,ae,be,pw,no)});
 }
 if(!rows.length){toast("Vyplň aspoň jeden zápas");return;}
 const{error}=await sb.from("predictions").upsert(rows,{onConflict:"player,match_no"});
 if(error){toast("Chyba: "+error.message);return;}
 toast("Uložené ✅ ("+rows.length+" zápasov)");
}

// ================= TABUĽKA =================
async function loadBoard(){
 $("s-tab").innerHTML='<p class="note">Načítavam…</p>';
 await loadResults();
 const{data:preds}=await sb.from("predictions").select("*");
 const players={};
 (preds||[]).forEach(p=>{players[p.player]=players[p.player]||{};players[p.player][p.match_no]=p;});
 const me=localStorage.getItem("tip_name")||"";
 const rows=Object.keys(players).map(pl=>{
   let tot=0,done=0;
   for(const m of M){const no=m[0];const P=players[pl][no];const R=RESULTS[no];
     if(R&&R.finished){done; const s=P?scoreOne(P,R):0; tot+=(s||0);}}
   return {pl,tot};
 }).sort((x,y)=>y.tot-x.tot);
 const finished=M.filter(m=>RESULTS[m[0]]&&RESULTS[m[0]].finished).length;
 let h=`<div class="card"><span class="pill">${rows.length} hráčov</span> <span class="pill">${finished}/16 zápasov odohraných</span></div>`;
 h+=`<div class="card"><table><thead><tr><th class="rank">#</th><th>Hráč</th><th class="r">Body</th></tr></thead><tbody>`;
 rows.forEach((r,i)=>{h+=`<tr><td class="rank">${i+1}</td><td class="${r.pl===me?'me':''}">${r.pl}</td><td class="r"><b>${r.tot}</b></td></tr>`;});
 h+=`</tbody></table></div>`;
 // per-match breakdown
 h+=`<details><summary>Detail po zápasoch</summary>`;
 for(const m of M){const no=m[0];const R=RESULTS[no];if(!R||!R.finished)continue;
   const[A,B]=TEAM[no];
   let res=`${A} ${R.t1_90}:${R.t2_90}`+(R.went_et?` (pred. ${R.t1_et}:${R.t2_et})`:"")+(R.went_pens?` (pen ${R.pen_t1}:${R.pen_t2})`:"")+` ${B} → ${R.advancer}`;
   h+=`<div class="card"><div class="mhead"><span>M${no}</span></div><div style="font-size:.85rem">${res}</div>`;
   const scored=rows.map(r=>{const P=players[r.pl][no];return {pl:r.pl,s:P?scoreOne(P,R):0,P};}).sort((x,y)=>y.s-x.s);
   scored.forEach(s=>{h+=`<div class="bd">${s.pl}: <b>${s.s}b</b>${s.P?` (tip ${s.P.t1_90}:${s.P.t2_90}${s.P.pen_winner?', pen '+s.P.pen_winner:''})`:' (bez tipu)'}</div>`;});
   h+=`</div>`;
 }
 h+=`</details>`;
 $("s-tab").innerHTML=h;
}

// ================= ADMIN =================
function renderAdmin(){
 if(sessionStorage.getItem("adm")!=="1"){
   $("s-adm").innerHTML=`<div class="card"><p class="note">Zadaj admin PIN (len pre teba — zadávanie výsledkov).</p>
     <input type="password" id="pin" placeholder="PIN"><button class="btn" onclick="checkPin()">Vstúpiť</button></div>`;
   return;
 }
 let h=`<p class="note">Zadaj skutočné výsledky. Po uložení sa tabuľka prepočíta a daný zápas sa hráčom zamkne.</p>`;
 M.forEach(m=>{const[no,A,B,when]=m;const R=RESULTS[no]||{};
  h+=`<div class="card"><div class="mhead"><span>M${no} · ${when}</span><span>${R.finished?'<span class="fin">✓ uložené</span>':''}</span></div>
   <div class="teams"><div class="tn r">${A}</div>
     <div class="sc"><input type="number" min="0" id="Ra${no}" value="${R.t1_90??''}"><span class="x">:</span><input type="number" min="0" id="Rb${no}" value="${R.t2_90??''}"></div>
     <div class="tn">${B}</div></div>
   <div class="extra"><div class="row"><label><input type="checkbox" id="Ret${no}" ${R.went_et?'checked':''}> predĺženie</label>
     <span class="sc"><input type="number" min="0" id="Rae${no}" value="${R.t1_et??''}"><span class="x">:</span><input type="number" min="0" id="Rbe${no}" value="${R.t2_et??''}"></span></div>
   <div class="row"><label><input type="checkbox" id="Rpen${no}" ${R.went_pens?'checked':''}> penalty</label>
     <span class="sc"><input type="number" min="0" id="Rpa${no}" value="${R.pen_t1??''}"><span class="x">:</span><input type="number" min="0" id="Rpb${no}" value="${R.pen_t2??''}"></span></div></div>
   <button class="btn gold" style="margin-top:10px;padding:10px" onclick="saveResult(${no})">Uložiť výsledok M${no}</button></div>`;
 });
 $("s-adm").innerHTML=h;
}
function checkPin(){if($("pin").value===ADMIN_PIN){sessionStorage.setItem("adm","1");renderAdmin();}else toast("Zlý PIN");}
async function saveResult(no){
 const[A,B]=TEAM[no];
 const a=iv($("Ra"+no).value),b=iv($("Rb"+no).value);
 if(a==null||b==null){toast("Zadaj skóre 90'");return;}
 const went_et=$("Ret"+no).checked, ae=iv($("Rae"+no).value),be=iv($("Rbe"+no).value);
 const went_pens=$("Rpen"+no).checked, pa=iv($("Rpa"+no).value),pb=iv($("Rpb"+no).value);
 let pen_winner=null;
 if(went_pens){pen_winner = (pa!=null&&pb!=null) ? (pa>pb?A:B) : null;}
 const advancer=advFromScores(a,b,went_et?ae:null,went_et?be:null,pen_winner,no);
 if(!advancer){toast("Nejasný postupujúci — doplň predĺženie/penalty");return;}
 const row={match_no:no,t1_90:a,t2_90:b,went_et,t1_et:went_et?ae:null,t2_et:went_et?be:null,
   went_pens,pen_t1:went_pens?pa:null,pen_t2:went_pens?pb:null,advancer,finished:true,updated_at:new Date().toISOString()};
 const{error}=await sb.from("results").upsert(row,{onConflict:"match_no"});
 if(error){toast("Chyba: "+error.message);return;}
 RESULTS[no]=row; toast("Výsledok M"+no+" uložený ✅");
}

// init
(async()=>{await loadResults();renderTip();})();
</script>
</body>
</html>
