<!-- Practeo Admin — Faktúry (cloud verzia: Supabase backend + prihlásenie) -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Practeo Admin — Faktúry</title>
<style>
:root{--bg:#0b0d12;--card:#141821;--line:#252b36;--txt:#e6e9ef;--mut:#8a90a0;--acc:#4c7dff;--grn:#2fbf6b;--red:#e0715f;--gold:#e6c86a}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:15px}
header{background:#0d1017;border-bottom:1px solid var(--line);padding:12px 14px;position:sticky;top:0;z-index:5}
h1{margin:0;font-size:1.05rem;display:flex;align-items:center;gap:8px}
h1 .tag{font-size:.62rem;color:var(--mut);border:1px solid var(--line);padding:2px 6px;border-radius:6px;font-weight:400}
nav{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
nav button{flex:1;min-width:90px;background:#11151d;color:var(--mut);border:1px solid var(--line);padding:9px;border-radius:9px;font-weight:600;cursor:pointer;font-size:.85rem}
nav button.on{background:var(--acc);color:#fff;border-color:var(--acc)}
main{max-width:820px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
label{display:block;font-size:.78rem;color:var(--mut);margin:8px 0 3px}
input,select,textarea{width:100%;background:#0f131a;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px;font-size:.9rem;font-family:inherit}
textarea{min-height:52px;resize:vertical}
.row{display:flex;gap:8px}.row>*{flex:1}
button.act{background:var(--acc);color:#fff;border:none;border-radius:9px;padding:11px 14px;font-weight:700;cursor:pointer;font-size:.9rem}
button.ghost{background:#11151d;color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:9px 12px;cursor:pointer;font-size:.85rem}
button.mini{background:none;border:none;color:var(--mut);cursor:pointer;font-size:.85rem}
.mut{color:var(--mut);font-size:.82rem}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--line)}
th{color:var(--mut);font-weight:600;font-size:.72rem}
.r{text-align:right}
.pill{display:inline-block;font-size:.68rem;padding:2px 7px;border-radius:20px}
.pill.pd{background:rgba(47,191,107,.15);color:var(--grn)}
.pill.un{background:rgba(224,113,95,.15);color:var(--red)}
.itrow{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.itrow input{font-size:.82rem;padding:7px}
.itrow .d{flex:3}.itrow .q{flex:1}.itrow .p{flex:1.4}.itrow .x{flex:0 0 auto}
.tot{display:flex;justify-content:space-between;padding:5px 0;font-size:.9rem}
.tot.big{font-weight:800;font-size:1.1rem;border-top:1px solid var(--line);margin-top:6px;padding-top:8px}
.help{background:rgba(76,125,255,.08);border:1px solid rgba(76,125,255,.25);border-radius:9px;padding:9px 11px;font-size:.8rem;color:#b9c4e6;margin-bottom:10px}
/* Faktúra na tlač */
#print{display:none}
@media print{
  body{background:#fff}
  header,main,#toast{display:none!important}
  #print{display:block!important;color:#000;font-size:12px;padding:0}
}
#print .inv{color:#000;background:#fff;max-width:800px;margin:0 auto;padding:24px;font-family:Arial,sans-serif}
#print h2{font-size:22px;margin:0 0 2px}
#print .box{border:1px solid #bbb;border-radius:6px;padding:10px;font-size:12px}
#print table{font-size:12px}#print th,#print td{border-bottom:1px solid #ddd;color:#000}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#222836;color:#fff;padding:10px 16px;border-radius:10px;opacity:0;transition:.2s;font-size:.85rem;z-index:20}
#toast.show{opacity:1}
</style>

<header>
  <h1>📊 Practeo Admin <span class="tag">Faktúry · cloud</span><span id="syncdot" title="ukladám do cloudu…" style="margin-left:auto;font-size:.6rem;color:var(--gold);opacity:0;transition:.3s">● sync</span><button onclick="logout()" class="mini" style="color:var(--mut);font-size:.72rem">Odhlásiť</button></h1>
  <nav>
    <button id="t-dash" onclick="tab('dash')">📈 Dashboard</button>
    <button id="t-fak" class="on" onclick="tab('fak')">🧾 Faktúry</button>
    <button id="t-new" onclick="tab('new')">➕ Faktúra</button>
    <button id="t-nak" onclick="tab('nak')">🧾 Náklady</button>
    <button id="t-ces" onclick="tab('ces')">🚗 Cesty</button>
    <button id="t-doh" onclick="tab('doh')">🧑‍🎓 Dohodári</button>
    <button id="t-maj" onclick="tab('maj')">🏢 Majetok</button>
    <button id="t-zml" onclick="tab('zml')">📄 Zmluvy</button>
    <button id="t-cli" onclick="tab('cli')">👥 Klienti</button>
    <button id="t-set" onclick="tab('set')">⚙️ Nastavenia</button>
  </nav>
</header>
<main>
  <div id="s-dash" style="display:none"></div>
  <div id="s-fak"></div>
  <div id="s-new" style="display:none"></div>
  <div id="s-nak" style="display:none"></div>
  <div id="s-ces" style="display:none"></div>
  <div id="s-doh" style="display:none"></div>
  <div id="s-maj" style="display:none"></div>
  <div id="s-zml" style="display:none"></div>
  <div id="s-cli" style="display:none"></div>
  <div id="s-set" style="display:none"></div>
</main>
<div id="print"></div>
<div id="toast"></div>
<div id="login" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:50;align-items:center;justify-content:center;padding:20px">
  <div class="card" style="max-width:340px;width:100%">
    <div style="font-size:1.15rem;font-weight:700;margin-bottom:2px">📊 Practeo Admin</div>
    <p class="mut" style="margin:0 0 6px">Prihlás sa do účtovnej appky</p>
    <label>Email</label><input id="lg_email" type="email" autocomplete="username" inputmode="email">
    <label>Heslo</label><input id="lg_pass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <div id="lg_err" style="color:var(--red);font-size:.78rem;min-height:16px;margin-top:6px"></div>
    <button class="act" style="width:100%;margin-top:6px" onclick="doLogin()">Prihlásiť sa</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const $=id=>document.getElementById(id);
// ===== Cloud úložisko (Supabase) — dáta sú v cloude, localStorage slúži ako offline záloha =====
const SB_URL='https://eboaxggsmlbcjsosfjyu.supabase.co';
const SB_KEY='sb_publishable_KRN9iGyNXGLGRru7p_UXRA_7XK3FwZ8';
let sb=null, CACHE={}, _sync={};
function sbInit(){if(!sb)sb=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true}});return sb}
const LS={
  get:(k,d)=>{const v=CACHE[k];return (v===undefined||v===null)?d:v},
  set:(k,v)=>{CACHE[k]=v;try{localStorage.setItem('practeo_'+k,JSON.stringify(v))}catch(e){}cloudPush(k,v)}
};
async function cloudPush(k,v){
  if(!sb)return;
  _sync[k]=(_sync[k]||0)+1;syncBadge();
  try{const {error}=await sb.from('practeo_data').upsert({key:k,value:v,updated_at:new Date().toISOString()},{onConflict:'key'});if(error)throw error}
  catch(e){toast('⚠️ Cloud: '+(e.message||'nezapísané'))}
  finally{_sync[k]=(_sync[k]||1)-1;syncBadge()}
}
function syncBadge(){const n=Object.values(_sync).reduce((a,b)=>a+Math.max(0,b),0);const el=$('syncdot');if(el)el.style.opacity=n>0?'1':'0'}
async function cloudLoadAll(){const {data,error}=await sb.from('practeo_data').select('key,value');if(error){toast('⚠️ Načítanie zlyhalo');return}CACHE={};(data||[]).forEach(r=>{CACHE[r.key]=r.value})}
async function migrateLocalIfNeeded(){
  const keys=['supplier','clients','invoices','expenses','vehicles','trips','dohodari','assets','counters'];
  if(!keys.every(k=>CACHE[k]===undefined))return;
  let any=false;
  for(const k of keys){const raw=localStorage.getItem('practeo_'+k);if(raw!=null){try{CACHE[k]=JSON.parse(raw);await cloudPush(k,CACHE[k]);any=true}catch(e){}}}
  if(any)toast('Lokálne dáta prenesené do cloudu ✅');
}
function loadGlobals(){
  SUP=LS.get('supplier',SUP);CLI=LS.get('clients',CLI);INV=LS.get('invoices',INV);
  EXP=LS.get('expenses',EXP);VOZ=LS.get('vehicles',VOZ);JAZ=LS.get('trips',JAZ);
  DOH=LS.get('dohodari',DOH);MAJ=LS.get('assets',MAJ);CNT=LS.get('counters',CNT);
}
async function doLogin(){
  const email=$('lg_email').value.trim(),pass=$('lg_pass').value;$('lg_err').textContent='';
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){$('lg_err').textContent='Prihlásenie zlyhalo: '+error.message;return}
  await afterAuth();
}
async function afterAuth(){$('login').style.display='none';await cloudLoadAll();await migrateLocalIfNeeded();loadGlobals();renderFak()}
async function logout(){try{await sb.auth.signOut()}catch(e){}location.reload()}
async function init(){
  sbInit();
  try{const {data:{session}}=await sb.auth.getSession();if(session){await afterAuth();return}}catch(e){}
  $('login').style.display='flex';
}
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const eur=n=>(Math.round((+n||0)*100)/100).toLocaleString('sk-SK',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200)}
// režimy DPH (2026): 23 základná, 19 a 5 znížené, oslobodené (§38 prenájom), reverse charge
const DPHM={
 none:{r:0,lbl:'Neplatiteľ DPH (bez DPH)'},
 sk23:{r:0.23,lbl:'Platiteľ SK — 23 % (poradenstvo, tovar)'},
 sk:{r:0.23,lbl:'Platiteľ SK — 23 %'},
 sk5:{r:0.05,lbl:'Znížená 5 % (ubytovanie / apartmán / krátkodobý prenájom)'},
 sk19:{r:0.19,lbl:'Znížená 19 %'},
 exempt:{r:0,lbl:'Oslobodené — dlhodobý prenájom nehnuteľnosti (§38)'},
 rc:{r:0,lbl:'Reverse charge (do ČR/EÚ) — prenesenie daňovej povinnosti'}
};
function dphNote(m){
 if(m==='rc')return'Prenesenie daňovej povinnosti — Reverse charge. Daň odvedie príjemca (čl. 196 smernice Rady 2006/112/ES). Miesto dodania podľa § 15 ods. 1 zákona o DPH.';
 if(m==='exempt')return'Oslobodené od dane podľa § 38 zákona o DPH (nájom nehnuteľnosti).';
 if(m==='none')return'Dodávateľ nie je platiteľom DPH.';
 return'';
}

// ---- default dodávateľ (Practeo) ----
let SUP=LS.get('supplier',{meno:'Practeo, s.r.o.',sidlo:'SNP 1786/72, 069 01 Snina',ico:'',dic:'',icdph:'',iban:'',konatel:'Ing. Peter Pčola'});
let CLI=LS.get('clients',[]);
let INV=LS.get('invoices',[]);
let EXP=LS.get('expenses',[]);
const KAT=['Nájom / sídlo','Účtovníctvo / právne','Technika a softvér / AI','Auto / PHM / servis','Telefón / internet','Cestovné / diéty','Marketing / web','Vzdelávanie / knihy','Poistenie','Bankové poplatky','Materiál / kancelária','Nehnuteľnosti (náklady)','Ostatné'];
const VRATE={none:0,'23':0.23,'5':0.05,'19':0.19};
let VOZ=LS.get('vehicles',[]);
let JAZ=LS.get('trips',[]);
let DOH=LS.get('dohodari',[]);
let MAJ=LS.get('assets',[]);
const ODS={1:{r:4,d:'1 – 4 roky (autá, motorky, PC, technika)'},2:{r:6,d:'2 – 6 rokov (nábytok, stroje)'},3:{r:8,d:'3 – 8 rokov'},4:{r:12,d:'4 – 12 rokov'},5:{r:20,d:'5 – 20 rokov (priemyselné budovy)'},6:{r:40,d:'6 – 40 rokov (admin/bytové budovy)'}};
function majOdpis(m){const c=+m.cena||0;if(c<=1700)return{rocny:c,roky:1,drobny:true};const roky=(ODS[m.sk]||ODS[1]).r;return{rocny:c/roky,roky,drobny:false}}
const NCZD_M=5966.73/12;   // mesačná nezdaniteľná časť
function dohCalc(d){
 const o=+d.odmena||0;let ee=0,er=0,danZ;
 if(d.typ==='iný'){ee=o*0.134;er=o*0.352;danZ=Math.max(0,o-ee-NCZD_M);}
 else{const oop=d.oop!==false;const z=oop?Math.max(0,o-200):o;ee=z*0.07;er=o*0.0105+z*0.2175;
   danZ=(d.typ==='dôchodca')?Math.max(0,o-ee):Math.max(0,o-ee-NCZD_M);}
 const dan=danZ*0.19;return{o,ee,dan,cista:o-ee-dan,er,naklad:o+er};
}
const KMRATE=0.313;                 // základná náhrada €/km (2026)
function dietaFor(h){if(h==null||h<5)return 0;if(h<=12)return 8.80;if(h<=18)return 13.10;return 19.50}
function tripHours(od,pr){if(!od||!pr)return null;const a=new Date(od),b=new Date(pr);const h=(b-a)/3600000;return h>0?h:null}

let cur=null; // rozpracovaná faktúra
// Číslovanie: perzistentné počítadlá podľa typu (číslo sa nikdy nepoužije 2x → žiadne duplikáty)
let CNT=LS.get('counters',{F:0,Z:0,D:0});
const TYPPFX={'faktúra':'F','zálohová':'Z','dobropis':'D'};
const TYPLBL={'faktúra':'FAKTÚRA','zálohová':'ZÁLOHOVÁ FAKTÚRA','dobropis':'DOBROPIS'};
function peekNo(typ){const k=TYPPFX[typ]||'F';return `${k}${new Date().getFullYear()}${String((CNT[k]||0)+1).padStart(3,'0')}`}
function nextNo(typ){const k=TYPPFX[typ]||'F';CNT[k]=(CNT[k]||0)+1;LS.set('counters',CNT);return `${k}${new Date().getFullYear()}${String(CNT[k]).padStart(3,'0')}`}

function tab(t){for(const k of ['dash','fak','new','nak','ces','doh','maj','zml','cli','set']){$('s-'+k).style.display=k===t?'':'none';$('t-'+k).classList.toggle('on',k===t)}
 if(t==='dash')renderDash();if(t==='fak')renderFak();if(t==='new')renderNew();if(t==='nak')renderNak();if(t==='ces')renderCes();if(t==='doh')renderDoh();if(t==='maj')renderMaj();if(t==='zml')renderZml();if(t==='cli')renderCli();if(t==='set')renderSet()}

// ===== NASTAVENIA =====
function renderSet(){
 $('s-set').innerHTML=`<div class="card"><b>Údaje dodávateľa (Practeo)</b><p class="mut">Zobrazia sa na každej faktúre. Doplň IČO/DIČ/IČ DPH/IBAN po zápise.</p>
 <label>Obchodné meno</label><input id="su_meno" value="${esc(SUP.meno)}">
 <label>Sídlo</label><input id="su_sidlo" value="${esc(SUP.sidlo)}">
 <div class="row"><div><label>IČO</label><input id="su_ico" value="${esc(SUP.ico)}"></div><div><label>DIČ</label><input id="su_dic" value="${esc(SUP.dic)}"></div></div>
 <div class="row"><div><label>IČ DPH</label><input id="su_icdph" value="${esc(SUP.icdph)}" placeholder="SK..."></div><div><label>IBAN</label><input id="su_iban" value="${esc(SUP.iban)}"></div></div>
 <label>Konateľ</label><input id="su_kon" value="${esc(SUP.konatel)}">
 <div style="margin-top:12px"><button class="act" onclick="saveSup()">Uložiť</button></div></div>
 <div class="card"><b>📤 Export pre účtovníka</b><p class="mut">Stiahni prehľady a pošli účtovníkovi.</p>
  <div style="display:flex;gap:8px;flex-wrap:wrap"><button class="ghost" onclick="exportFakCSV()">🧾 Faktúry (CSV)</button><button class="ghost" onclick="exportNakCSV()">💸 Náklady (CSV)</button></div></div>
 <div class="card"><b>💾 Záloha dát</b><p class="mut">Dáta sú v cloude (Supabase) a synchronizujú sa automaticky medzi zariadeniami. JSON záloha nižšie je navyše, na stiahnutie do počítača.</p>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><button class="ghost" onclick="exportJSON()">⬇️ Stiahnuť zálohu (JSON)</button>
  <label class="ghost" style="cursor:pointer">⬆️ Obnoviť zo zálohy<input type="file" accept=".json,application/json" style="display:none" onchange="importJSON(this)"></label></div></div>`;
}
function saveSup(){SUP={meno:$('su_meno').value,sidlo:$('su_sidlo').value,ico:$('su_ico').value,dic:$('su_dic').value,icdph:$('su_icdph').value,iban:$('su_iban').value,konatel:$('su_kon').value};LS.set('supplier',SUP);toast('Uložené ✅')}

// ===== KLIENTI =====
function renderCli(){
 let h=`<div class="card"><b>Nový klient</b>
 <label>Názov / meno</label><input id="cl_meno">
 <label>Adresa</label><input id="cl_adr">
 <div class="row"><div><label>IČO</label><input id="cl_ico"></div><div><label>IČ DPH</label><input id="cl_icdph" placeholder="napr. CZ..."></div></div>
 <label>Krajina</label><select id="cl_kraj"><option>Slovensko</option><option>Česko</option><option>iná EÚ</option><option>mimo EÚ</option></select>
 <div style="margin-top:10px"><button class="act" onclick="addCli()">Pridať klienta</button></div></div>
 <div class="card"><b>Klienti (${CLI.length})</b>`;
 if(!CLI.length)h+='<p class="mut">Zatiaľ žiadni klienti.</p>';
 CLI.forEach((c,i)=>{h+=`<div style="border-bottom:1px solid var(--line);padding:7px 0"><b>${esc(c.meno)}</b> <span class="mut">· ${esc(c.kraj)}</span><br><span class="mut">${esc(c.adr||'')} ${c.icdph?'· IČ DPH '+esc(c.icdph):''}</span> <button class="mini" onclick="delCli(${i})">✕ zmazať</button></div>`});
 h+='</div>';$('s-cli').innerHTML=h;
}
function addCli(){const m=$('cl_meno').value.trim();if(!m){toast('Zadaj názov');return}CLI.push({meno:m,adr:$('cl_adr').value,ico:$('cl_ico').value,icdph:$('cl_icdph').value,kraj:$('cl_kraj').value});LS.set('clients',CLI);renderCli();toast('Klient pridaný ✅')}
function delCli(i){CLI.splice(i,1);LS.set('clients',CLI);renderCli()}

// ===== NOVÁ FAKTÚRA =====
function renderNew(){
 if(!cur)cur={no:'',typ:'faktúra',ref:'',cli:null,dvyst:today(),ddod:today(),dspl:plus(14),items:[{d:'',q:1,p:0}],dph:'rc',paid:false};
 const opt=CLI.map((c,i)=>`<option value="${i}" ${cur.cli===i?'selected':''}>${esc(c.meno)}</option>`).join('');
 let h=`<div class="card">
  <div class="row"><div><label>Typ dokladu</label><select id="f_typ" onchange="cur.typ=this.value;renderNew()">
    <option value="faktúra" ${cur.typ==='faktúra'?'selected':''}>Faktúra (daňový doklad)</option>
    <option value="zálohová" ${cur.typ==='zálohová'?'selected':''}>Zálohová faktúra</option>
    <option value="dobropis" ${cur.typ==='dobropis'?'selected':''}>Dobropis (opravná faktúra)</option></select></div>
  <div><label>Číslo${cur.no?'':' (pridelí sa pri uložení)'}</label><input id="f_no" value="${esc(cur.no)}" placeholder="${esc(peekNo(cur.typ))}"></div></div>
  ${cur.typ==='dobropis'?`<label>Opravuje faktúru č.</label><input id="f_ref" value="${esc(cur.ref||'')}" placeholder="napr. F2026001"><div class="help">Dobropis opravuje pôvodnú faktúru — sumy zadaj so znamienkom mínus (napr. -100).</div>`:''}
  ${cur.typ==='zálohová'?'<div class="help">Zálohová faktúra je výzva na úhradu — NIE je daňový doklad. Po zaplatení vystavíš riadnu faktúru.</div>':''}
  <div><label>Klient</label><select id="f_cli" onchange="cur.cli=this.value===''?null:+this.value"><option value="">— vyber —</option>${opt}</select></div>
  <div class="row"><div><label>Dátum vystavenia</label><input type="date" id="f_dvyst" value="${cur.dvyst}"></div>
  <div><label>Dátum dodania</label><input type="date" id="f_ddod" value="${cur.ddod}"></div>
  <div><label>Splatnosť</label><input type="date" id="f_dspl" value="${cur.dspl}"></div></div>
  <label>Režim DPH</label>
  <select id="f_dph" onchange="cur.dph=this.value;renderNew()">
    ${['none','sk23','sk5','sk19','exempt','rc'].map(k=>`<option value="${k}" ${cur.dph===k||(cur.dph==='sk'&&k==='sk23')?'selected':''}>${DPHM[k].lbl}</option>`).join('')}
  </select>
  ${cur.dph==='rc'?'<div class="help">Bez DPH — prenesenie daňovej povinnosti. Uveď IČ DPH klienta.</div>':''}
  ${cur.dph==='exempt'?'<div class="help">Bez DPH — oslobodené (§38, dlhodobý nájom nehnuteľnosti). Pozn.: krátkodobé ubytovanie NIE je oslobodené — použi 5 %.</div>':''}

let curExpFoto=null;
function renderNak(){
 let h=`<div class="card"><b>Nový náklad</b>

  <label style="margin-top:8px"><input type="checkbox" id="e_uzn" checked style="width:auto;margin-right:6px;vertical-align:middle">Uznateľný náklad</label>
  <label>Doklad (foto) — appka ho prečíta a predvyplní</label><input type="file" accept="image/*" id="e_foto" onchange="loadFoto(this)">
  <div id="e_fotoprev"></div>
  <div class="help">📸 Odfoť doklad → appka prečíta <b>sumu a dátum</b>, ty len skontroluj a oprav. (Prvé čítanie chvíľu trvá — sťahuje slovenský slovník; potom je rýchle.)</div>
  <div style="margin-top:8px"><button class="act" onclick="addExp()">Pridať náklad</button></div></div>
  <div class="card"><b>Náklady (${EXP.length})</b>`;
 if(!EXP.length)h+='<p class="mut">Zatiaľ žiadne.</p>';
 else{h+='<table><thead><tr><th>Dátum</th><th>Dodávateľ / kategória</th><th class="r">Suma</th><th></th></tr></thead><tbody>';
  EXP.forEach(e=>{h+=`<tr><td>${esc(e.dat)}</td><td>${esc(e.dod||'—')}<br><span class="mut">${esc(e.kat)}${e.uzn?'':' · NEuzn.'}</span></td><td class="r"><b>${eur(e.sum)}</b>${e.dph!=='none'?`<br><span class="mut">DPH ${esc(e.dph)}%</span>`:''}</td><td class="r">${e.foto?`<button class="mini" onclick="viewFoto(${e.id})">🖼️</button>`:''}<button class="mini" onclick="delExp(${e.id})">✕</button></td></tr>`});
  h+='</tbody></table>'}
 h+='</div>';$('s-nak').innerHTML=h;curExpFoto=null;
}
function loadFoto(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{
  const cv=document.createElement('canvas');const mx=1200;let w=img.width,ht=img.height;if(w>mx){ht=Math.round(ht*mx/w);w=mx}cv.width=w;cv.height=ht;cv.getContext('2d').drawImage(img,0,0,w,ht);
  try{curExpFoto=cv.toDataURL('image/jpeg',0.6)}catch(e){curExpFoto=null}
  $('e_fotoprev').innerHTML=(curExpFoto?`<img src="${curExpFoto}" style="max-width:150px;border-radius:8px;margin-top:6px">`:'')+'<div id="ocrst" class="mut" style="margin-top:6px">📸 Čítam doklad… (prvýkrát to chvíľu trvá)</div>';
  runOCR(cv.toDataURL('image/jpeg',0.85));
 };img.src=ev.target.result};r.readAsDataURL(f)}
function runOCR(dataUrl){
 const st=()=>$('ocrst');
 if(typeof Tesseract==='undefined'){if(st())st().textContent='OCR nedostupné — zadaj údaje ručne.';return}
 Tesseract.recognize(dataUrl,'slk+eng').then(({data})=>{
   const p=parseDoklad(data.text||'');
   if(p.sum&&$('e_sum')&&!$('e_sum').value)$('e_sum').value=p.sum;
   if(p.date&&$('e_dat'))$('e_dat').value=p.date;
   if(p.dod&&$('e_dod')&&!$('e_dod').value)$('e_dod').value=p.dod;
   if(st())st().innerHTML='✅ Prečítané — skontroluj sumu/dátum a oprav, ak treba.';
 }).catch(()=>{if(st())st().textContent='Nepodarilo sa prečítať — zadaj ručne.'});
}
function parseDoklad(t){
 const res={};
 const nums=(t.match(/\d[\d .]*[,.]\d{2}/g)||[]).map(x=>{let s=x.trim().replace(/\s/g,'');if(s.indexOf(',')>-1){s=s.replace(/\./g,'').replace(',','.')}return parseFloat(s)}).filter(n=>!isNaN(n)&&n>0&&n<1e7);
 if(nums.length)res.sum=Math.max(...nums);
 const dm=t.match(/(\d{1,2})[.\/-]\s?(\d{1,2})[.\/-]\s?(\d{2,4})/);
 if(dm){let y=dm[3];if(y.length===2)y='20'+y;res.date=`${y}-${String(+dm[2]).padStart(2,'0')}-${String(+dm[1]).padStart(2,'0')}`}
 const line=(t.split('\n').map(l=>l.trim()).filter(l=>l.length>2&&/[A-Za-zÁ-Žá-ž]/.test(l))[0]||'').slice(0,40);
 if(line)res.dod=line;
 return res;
}

function delExp(id){EXP=EXP.filter(e=>e.id!==id);LS.set('expenses',EXP);renderNak()}

function addJaz(){if(!VOZ.length){toast('Najprv pridaj vozidlo');return}const km=+$('j_km').value;if(!km){toast('Zadaj km');return}const h=tripHours($('j_od').value,$('j_pr').value);JAZ.unshift({id:Date.now(),voz:+$('j_voz').value,km:km,from:$('j_from').value,to:$('j_to').value,ucel:$('j_ucel').value,od:$('j_od').value,pr:$('j_pr').value,dietH:h});LS.set('trips',JAZ);toast('Cesta uložená ✅');renderCes()}

function cestPrikaz(id){const j=JAZ.find(x=>x.id===id);const v=VOZ[j.voz]||{};const n=nahrada(j);
 $('print').innerHTML=`<div class="inv"><h2>CESTOVNÝ PRÍKAZ</h2>

  <div style="display:flex;justify-content:flex-end;margin-top:12px"><table style="min-width:290px">
   <tr><td>Základná náhrada (${j.km} km × ${KMRATE.toFixed(3)} €)</td><td class="r">${eur(n.zakl)}</td></tr>
   <tr><td>${v.pal==='elektro'?'Náhrada za elektrinu':'Náhrada za PHM'} (${v.spot||0} ${v.pal==='elektro'?'kWh':'l'}/100 × ${v.cena||0} €)</td><td class="r">${eur(n.phm)}</td></tr>
   <tr><td>Stravné (diéty)</td><td class="r">${eur(n.diet)}</td></tr>

 window.print();

// ===== DOHODÁRI =====
function renderDoh(){
 let h=`<div class="card"><b>🧑‍🎓 Nový dohodár</b>
  <label>Meno</label><input id="d_meno">
  <div class="row"><div><label>Typ</label><select id="d_typ" onchange="dohPrev()"><option value="študent">Študent (DoBPŠ)</option><option value="dôchodca">Dôchodca</option><option value="iný">Iný dohodár (DPČ/DoVP)</option></select></div>
  <div><label>Odmena mesačne (€)</label><input type="number" step="1" id="d_odm" oninput="dohPrev()"></div></div>
  <label style="margin-top:8px"><input type="checkbox" id="d_oop" checked style="width:auto;margin-right:6px;vertical-align:middle" onchange="dohPrev()">Uplatňuje odvodovú výnimku (OOP 200 €) — študent/dôchodca</label>
  <div id="d_prev" class="help" style="display:none"></div>
  <div style="margin-top:8px"><button class="act" onclick="addDoh()">Uložiť dohodára</button></div></div>
  <div class="card"><b>Dohodári (${DOH.length})</b>`;
 if(!DOH.length)h+='<p class="mut">Zatiaľ žiadni.</p>';
 else{h+='<table><thead><tr><th>Meno</th><th>Typ / odmena</th><th class="r">Čistá / náklad</th><th></th></tr></thead><tbody>';
  DOH.forEach(d=>{const c=dohCalc(d);h+=`<tr><td>${esc(d.meno)}</td><td>${esc(d.typ)}<br><span class="mut">${eur(d.odmena)}/mes</span></td><td class="r">čistá <b>${eur(c.cista)}</b><br><span class="mut">náklad ${eur(c.naklad)}</span></td><td class="r"><button class="mini" onclick="delDoh(${d.id})">✕</button></td></tr>`});
  h+='</tbody></table><p class="mut" style="margin-top:6px">„Čistá" = čo dostane dohodár; „náklad" = odmena + odvody zamestnávateľa (mesačne).</p>'}
 h+='</div>';$('s-doh').innerHTML=h;dohPrev();
}
function dohPrev(){const t=$('d_typ');if(!t)return;const d={typ:t.value,odmena:+$('d_odm').value,oop:$('d_oop').checked};const c=dohCalc(d);const p=$('d_prev');if(!p)return;
 if(!d.odmena){p.style.display='none';return}p.style.display='';
 p.innerHTML=`Odvody zamestnanca: <b>${eur(c.ee)}</b> · Daň: <b>${eur(c.dan)}</b> → <b>Čistá odmena: ${eur(c.cista)}</b><br>Odvody zamestnávateľa: <b>${eur(c.er)}</b> → <b>Tvoj náklad: ${eur(c.naklad)}</b>${d.typ==='študent'&&d.odmena<=200?' · 🎯 do 200 € bez odvodov aj dane':''}`;
}
function addDoh(){const m=$('d_meno').value.trim();if(!m){toast('Zadaj meno');return}const o=+$('d_odm').value;if(!o){toast('Zadaj odmenu');return}DOH.unshift({id:Date.now(),meno:m,typ:$('d_typ').value,odmena:o,oop:$('d_oop').checked});LS.set('dohodari',DOH);toast('Dohodár uložený ✅');renderDoh()}
function delDoh(id){DOH=DOH.filter(d=>d.id!==id);LS.set('dohodari',DOH);renderDoh()}

// ===== MAJETOK + ODPISY =====
function renderMaj(){
 let h=`<div class="card"><b>🏢 Nový majetok</b>
  <label>Názov</label><input id="m_naz" placeholder="napr. motorka, notebook, byt…">
  <div class="row"><div><label>Obstarávacia cena (€)</label><input type="number" step="1" id="m_cena" oninput="majPrev()"></div>
  <div><label>Dátum obstarania</label><input type="date" id="m_dat" value="${today()}"></div></div>
  <label>Odpisová skupina</label><select id="m_sk" onchange="majPrev()">${Object.keys(ODS).map(k=>`<option value="${k}">${esc(ODS[k].d)}</option>`).join('')}</select>
  <div id="m_prev" class="help" style="display:none"></div>
  <div class="help">Pozn.: majetok do <b>1 700 €</b> = priamy náklad (neodpisuje sa). <b>Pozemok</b> sa neodpisuje nikdy (eviduj len stavbu).</div>
  <div style="margin-top:8px"><button class="act" onclick="addMaj()">Pridať majetok</button></div></div>
  <div class="card"><b>Majetok (${MAJ.length})</b>`;
 if(!MAJ.length)h+='<p class="mut">Zatiaľ žiadny.</p>';
 else{h+='<table><thead><tr><th>Názov</th><th>Cena / skupina</th><th class="r">Ročný odpis</th><th></th></tr></thead><tbody>';
  MAJ.forEach(m=>{const o=majOdpis(m);h+=`<tr><td>${esc(m.naz)}<br><span class="mut">${esc((m.dat||'').slice(0,10))}</span></td><td>${eur(m.cena)}<br><span class="mut">${o.drobny?'drobný majetok':'skup. '+m.sk+' · '+o.roky+' r.'}</span></td><td class="r"><b>${eur(o.rocny)}</b>${o.drobny?'<br><span class="mut">jednorazovo</span>':'/rok'}</td><td class="r"><button class="mini" onclick="delMaj(${m.id})">✕</button></td></tr>`});
  h+='</tbody></table>'}
 h+='</div>';$('s-maj').innerHTML=h;majPrev();
}
function majPrev(){const c=+($('m_cena')||{}).value||0;const sk=($('m_sk')||{}).value||'1';const o=majOdpis({cena:c,sk});const p=$('m_prev');if(!p)return;if(!c){p.style.display='none';return}p.style.display='';
 p.innerHTML=o.drobny?`Do 1 700 € → <b>priamy náklad ${eur(c)}</b> (neodpisuje sa)`:`Odpisuje sa <b>${o.roky} rokov</b> → ročný odpis <b>${eur(o.rocny)}</b>`;}
function addMaj(){const n=$('m_naz').value.trim();if(!n){toast('Zadaj názov');return}const c=+$('m_cena').value;if(!c){toast('Zadaj cenu');return}MAJ.unshift({id:Date.now(),naz:n,cena:c,dat:$('m_dat').value,sk:$('m_sk').value});LS.set('assets',MAJ);toast('Majetok pridaný ✅');renderMaj()}
function delMaj(id){MAJ=MAJ.filter(m=>m.id!==id);LS.set('assets',MAJ);renderMaj()}

// ===== DASHBOARD / DPH PREHĽAD =====
function renderDash(){
 const RINV=INV.filter(i=>!i.draft);
 const trzby=RINV.reduce((s,i)=>s+totals(i).base,0);
 const dphOut=RINV.reduce((s,i)=>s+totals(i).dph,0);
 const rcEU=RINV.filter(i=>i.dph==='rc').reduce((s,i)=>s+totals(i).base,0);
 const naklE=EXP.filter(e=>e.uzn).reduce((s,e)=>s+(+e.sum||0),0);
 const nahr=JAZ.reduce((s,j)=>s+nahrada(j).total,0);
 const odp=MAJ.reduce((s,m)=>s+majOdpis(m).rocny,0);
 const naklUzn=naklE+nahr+odp;
 const dphIn=EXP.reduce((s,e)=>{const r=VRATE[e.dph]||0;const t=+e.sum||0;return s+(t-t/(1+r))},0);
 const zisk=trzby-naklUzn;const danPO=Math.max(zisk*0.10,0);const saldo=dphOut-dphIn;
 $('s-dash').innerHTML=`<div class="card"><b>📈 Prehľad</b> <span class="mut">(všetky doklady)</span>
  <div class="tot"><span>Tržby (základ faktúr)</span><b>${eur(trzby)}</b></div>
  <div class="tot"><span>Náklady – doklady</span><b>${eur(naklE)}</b></div>
  <div class="tot"><span>Náklady – cestovné náhrady</span><b>${eur(nahr)}</b></div>
  <div class="tot"><span>Náklady – odpisy majetku (ročne)</span><b>${eur(odp)}</b></div>
  <div class="tot big"><span>Zisk (odhad)</span><span>${eur(zisk)}</span></div>
  <div class="tot"><span>Odhad dane PO (10 %)</span><b>${eur(danPO)}</b></div></div>
  <div class="card"><b>🧾 DPH prehľad</b> <span class="mut">(podklad pre účtovníka)</span>
  <div class="tot"><span>DPH na výstupe (z faktúr)</span><b>${eur(dphOut)}</b></div>
  <div class="tot"><span>DPH na vstupe (z nákladov)</span><b>${eur(dphIn)}</b></div>
  <div class="tot big"><span>${saldo>=0?'DPH na odvod':'Nadmerný odpočet'}</span><span>${eur(Math.abs(saldo))}</span></div>
  <div class="tot" style="margin-top:8px;border-top:1px solid var(--line);padding-top:8px"><span>Reverse-charge dodania do EÚ (VIES)</span><b>${eur(rcEU)}</b></div>
  <p class="mut" style="margin-top:8px">Podklad — oficiálne DPH priznanie, kontrolný a súhrnný výkaz (VIES) podáva účtovník z týchto čísel.</p></div>`;
}

// ===== EXPORT / ZÁLOHA =====
function dl(name,content,type){const b=new Blob([content],{type:type||'text/plain;charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}
function csvEsc(v){v=String(v==null?'':v);return /[",;\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v}
function exportFakCSV(){const R=[['Cislo','Typ','Datum','Klient','Zaklad','DPH','Spolu','Rezim','Stav']];INV.filter(i=>!i.draft).forEach(i=>{const t=totals(i);const c=CLI[i.cli]||{};R.push([i.no,i.typ,i.dvyst,c.meno,t.base.toFixed(2),t.dph.toFixed(2),t.total.toFixed(2),i.dph,i.paid?'zaplatena':'nezaplatena'])});dl('Practeo_faktury.csv','﻿'+R.map(r=>r.map(csvEsc).join(';')).join('\n'),'text/csv');toast('Export faktúr ✅')}
function exportNakCSV(){const R=[['Datum','Dodavatel','Popis','Kategoria','Suma','DPH_vstup','Uznatelny']];EXP.forEach(e=>R.push([e.dat,e.dod,e.pop,e.kat,(+e.sum||0).toFixed(2),e.dph,e.uzn?'ano':'nie']));dl('Practeo_naklady.csv','﻿'+R.map(r=>r.map(csvEsc).join(';')).join('\n'),'text/csv');toast('Export nákladov ✅')}
function exportJSON(){const all={supplier:SUP,clients:CLI,invoices:INV,expenses:EXP,vehicles:VOZ,trips:JAZ,dohodari:DOH,assets:MAJ,counters:CNT};dl('Practeo_zaloha.json',JSON.stringify(all,null,1),'application/json');toast('Kompletná záloha ✅')}
function importJSON(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!confirm('Nahradiť súčasné dáta obsahom zálohy?'))return;
 if(d.supplier){SUP=d.supplier;LS.set('supplier',SUP)}if(d.clients){CLI=d.clients;LS.set('clients',CLI)}if(d.invoices){INV=d.invoices;LS.set('invoices',INV)}if(d.expenses){EXP=d.expenses;LS.set('expenses',EXP)}if(d.vehicles){VOZ=d.vehicles;LS.set('vehicles',VOZ)}if(d.trips){JAZ=d.trips;LS.set('trips',JAZ)}if(d.dohodari){DOH=d.dohodari;LS.set('dohodari',DOH)}if(d.assets){MAJ=d.assets;LS.set('assets',MAJ)}if(d.counters){CNT=d.counters;LS.set('counters',CNT)}
 toast('Dáta obnovené ✅');renderSet()}catch(err){toast('Chyba: neplatný súbor')}};r.readAsText(f)}

// ---- utils ----
function today(){return new Date().toISOString().slice(0,10)}
function plus(days){const d=new Date();d.setDate(d.getDate()+days);return d.toISOString().slice(0,10)}

init();
